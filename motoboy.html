<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motoboy - Marcelo Entregas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* Login */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box {
            background: #1e293b;
            border: 2px solid #10b981;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 { font-size: 28px; margin-bottom: 10px; text-align: center; }
        .login-box p { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus { outline: none; border-color: #10b981; }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #10b981; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: #059669; }
        .demo-creds {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
        }
        
        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 20px 15px;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 22px; }
        .header p { font-size: 12px; color: #d1fae5; }
        .btn-logout { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .card-icon { font-size: 28px; margin-bottom: 5px; }
        .card-label { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
        .card-value { font-size: 24px; font-weight: bold; }
        
        /* Sections */
        .section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .section h2 { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* List Items */
        .list-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item-info { flex: 1; }
        .list-item-title { font-weight: bold; margin-bottom: 3px; }
        .list-item-subtitle { font-size: 12px; color: #94a3b8; }
        .list-item-value { font-size: 18px; font-weight: bold; color: #10b981; }
        
        /* Buttons */
        .btn {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn:hover { background: #059669; }
        .btn-small { padding: 8px 12px; font-size: 12px; }
        
        /* Forms */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-row.full { grid-template-columns: 1fr; }
        
        /* Empty State */
        .empty-state { text-align: center; color: #64748b; padding: 30px 15px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .tab-btn.active { background: #10b981; color: #fff; border-color: #10b981; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border-radius: 12px; padding: 20px; width: 90%; max-width: 500px; }
        .modal-close { float: right; font-size: 24px; cursor: pointer; color: #94a3b8; }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🏍️ Motoboy</h1>
        <p>Marcelo Entregas</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
        
        <div class="demo-creds">
            <strong>Teste:</strong><br>
            Email: marcelo@test.com<br>
            Senha: 123456
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <!-- Header -->
    <div class="header">
        <div>
            <h1>🏍️ Motoboy</h1>
            <p id="nomeUsuario">Bem-vindo!</p>
        </div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="container">
        <!-- Stats Cards -->
        <div class="cards-grid">
            <div class="card">
                <div class="card-icon">📦</div>
                <div class="card-label">Entregas</div>
                <div class="card-value" id="totalEntregas">0</div>
            </div>
            <div class="card">
                <div class="card-icon">⏳</div>
                <div class="card-label">Aguardando</div>
                <div class="card-value" id="totalAguardando">0</div>
            </div>
            <div class="card">
                <div class="card-icon">💰</div>
                <div class="card-label">Ganho</div>
                <div class="card-value" id="ganhoHoje">R$0</div>
            </div>
        </div>

        <!-- Chamados Disponíveis -->
        <div class="section">
            <h2>📞 Chamados Disponíveis</h2>
            <div id="chamadosList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Nenhum chamado disponível</p>
                </div>
            </div>
        </div>

        <!-- Minhas Entregas -->
        <div class="section">
            <h2>🚚 Minhas Entregas</h2>
            <div id="minhasEntregasList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Nenhuma entrega em andamento</p>
                </div>
            </div>
        </div>

        <!-- Ações Rápidas -->
        <div class="section">
            <h2>⚙️ Ações</h2>
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="abrirMapa()">📍 Abrir Mapa</button>
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="chamarSuporte()">📞 Suporte</button>
            <button class="btn" style="width: 100%;" onclick="verGanhos()">💰 Ver Ganhos</button>
        </div>
    </div>
</div>

<script>
    let usuarioAtual = null;

    // Fazer Login
    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            alert('Preencha email e senha!');
            return;
        }

        usuarioAtual = {
            email: email,
            nome: email.split('@')[0],
            id: Math.random().toString(36).substr(2, 9)
        };

        localStorage.setItem('usuarioMotoboy', JSON.stringify(usuarioAtual));
        mostrarDashboard();
        carregarDados();
    }

    // Fazer Logout
    function fazerLogout() {
        if (confirm('Deseja sair?')) {
            usuarioAtual = null;
            localStorage.removeItem('usuarioMotoboy');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    }

    // Mostrar Dashboard
    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('nomeUsuario').textContent = `Bem-vindo, ${usuarioAtual.nome}!`;
    }

    // Carregar Dados
    function carregarDados() {
        // Simular chamados
        const chamados = [
            { id: 1, loja: 'Restaurante do João', endereco: 'Rua A, 123', cliente: 'Maria', valor: 15.50 },
            { id: 2, loja: 'Pizzaria do Pedro', endereco: 'Rua B, 456', cliente: 'João', valor: 25.00 }
        ];

        const minhasEntregas = [
            { id: 101, cliente: 'Silva', endereco: 'Rua C, 789', status: 'Em andamento', valor: 20.00 }
        ];

        renderizarChamados(chamados);
        renderizarEntregas(minhasEntregas);
        atualizarEstatisticas(chamados, minhasEntregas);
    }

    // Renderizar Chamados
    function renderizarChamados(chamados) {
        const lista = document.getElementById('chamadosList');
        if (chamados.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum chamado</p></div>';
            return;
        }

        lista.innerHTML = chamados.map(c => `
            <div class="list-item">
                <div class="list-item-info">
                    <div class="list-item-title">${c.loja}</div>
                    <div class="list-item-subtitle">${c.endereco} • Para: ${c.cliente}</div>
                </div>
                <div style="text-align: right;">
                    <div class="list-item-value">R$ ${c.valor.toFixed(2)}</div>
                    <button class="btn btn-small" onclick="aceitarChamado(${c.id})">Aceitar</button>
                </div>
            </div>
        `).join('');
    }

    // Renderizar Entregas
    function renderizarEntregas(entregas) {
        const lista = document.getElementById('minhasEntregasList');
        if (entregas.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhuma entrega</p></div>';
            return;
        }

        lista.innerHTML = entregas.map(e => `
            <div class="list-item">
                <div class="list-item-info">
                    <div class="list-item-title">${e.cliente}</div>
                    <div class="list-item-subtitle">${e.endereco} • ${e.status}</div>
                </div>
                <div style="text-align: right;">
                    <div class="list-item-value">R$ ${e.valor.toFixed(2)}</div>
                    <button class="btn btn-small" onclick="finalizarEntrega(${e.id})">Finalizar</button>
                </div>
            </div>
        `).join('');
    }

    // Atualizar Estatísticas
    function atualizarEstatisticas(chamados, entregas) {
        document.getElementById('totalAguardando').textContent = chamados.length;
        document.getElementById('totalEntregas').textContent = entregas.length;
        const ganho = entregas.reduce((sum, e) => sum + e.valor, 0);
        document.getElementById('ganhoHoje').textContent = 'R$' + ganho.toFixed(0);
    }

    // Aceitar Chamado
    function aceitarChamado(id) {
        alert('✓ Chamado ' + id + ' aceito! Você está a caminho.');
        carregarDados();
    }

    // Finalizar Entrega
    function finalizarEntrega(id) {
        alert('✓ Entrega ' + id + ' finalizada!');
        carregarDados();
    }

    // Ações Rápidas
    function abrirMapa() {
        alert('📍 Abrindo mapa com sua localização...');
    }

    function chamarSuporte() {
        alert('📞 Suporte: (11) 99999-9999');
    }

    function verGanhos() {
        alert('💰 Ganho total este mês: R$ 1.250,00');
    }

    // Verificar login ao carregar
    window.addEventListener('load', function() {
        const usuario = localStorage.getItem('usuarioMotoboy');
        if (usuario) {
            usuarioAtual = JSON.parse(usuario);
            mostrarDashboard();
            carregarDados();
        }
    });

    // Atualizar dados a cada 10 segundos
    setInterval(function() {
        if (usuarioAtual) {
            carregarDados();
        }
    }, 10000);
</script>

</body>
</html>
