<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Marcelo - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <div class="max-w-md mx-auto p-4">
        <div class="bg-slate-800 rounded-3xl p-4 mb-4 border border-slate-700">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Meu WhatsApp (com DDD)</p>
            <div class="flex gap-2">
                <input id="meuZap" type="tel" placeholder="1499..." class="flex-1 bg-slate-900 border border-slate-600 rounded-xl p-2 text-sm font-bold outline-none focus:border-blue-500">
                <button onclick="salvarMeuZap()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">Salvar</button>
            </div>
        </div>

        <div class="bg-slate-800 rounded-3xl p-6 shadow-2xl border border-slate-700 mb-6">
            <div id="statusVisual" class="text-center mb-6">
                <span id="labelStatus" class="text-3xl font-black block text-slate-500">OFFLINE</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="updateStatus('disponivel')" class="p-3 bg-green-600 rounded-2xl font-bold text-[10px]">🟢 LIVRE</button>
                <button onclick="updateStatus('ocupado')" class="p-3 bg-orange-600 rounded-2xl font-bold text-[10px]">🟡 EM ROTA</button>
                <button onclick="updateStatus('offline')" class="p-3 bg-red-600 rounded-2xl font-bold text-[10px]">🔴 SAIR</button>
            </div>
        </div>

        <h2 class="text-lg font-black mb-4">📋 Fila de Espera</h2>
        <div id="listaFila" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Carregar e Salvar meu Zap
        async function carregarMeuZap() {
            const s = await getDoc(doc(db, 'config', 'status'));
            if(s.exists()) document.getElementById('meuZap').value = s.data().meuWhatsApp || "";
        }
        window.salvarMeuZap = () => {
            const zap = document.getElementById('meuZap').value.replace(/\D/g,'');
            setDoc(doc(db, 'config', 'status'), { meuWhatsApp: zap }, { merge: true });
            alert("WhatsApp atualizado!");
        };
        carregarMeuZap();

        window.updateStatus = (s) => {
            let label = s === 'disponivel' ? 'DISPONÍVEL' : s === 'ocupado' ? 'EM ROTA' : 'OFFLINE';
            setDoc(doc(db, 'config', 'status'), { label, online: s!=='offline' }, { merge: true });
        };

        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data() || { label: 'OFFLINE' };
            const el = document.getElementById('labelStatus');
            el.textContent = data.label;
            el.className = `text-3xl font-black block ${data.label === 'DISPONÍVEL' ? 'text-green-500' : data.label === 'EM ROTA' ? 'text-orange-500' : 'text-red-500'}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            const container = document.getElementById('listaFila');
            container.innerHTML = snap.empty ? '<p class="text-slate-500 text-center py-10">Fila vazia</p>' : '';
            let i = 1;
            snap.forEach(d => {
                const item = d.data();
                const div = document.createElement('div');
                div.className = `bg-slate-800 p-4 rounded-2xl border-l-4 ${item.status === 'Atendendo' ? 'border-blue-500' : 'border-slate-600'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-2">
                            <span class="text-[9px] font-bold bg-slate-700 px-2 py-1 rounded">${item.status === 'Atendendo' ? '🚀 EM ANDAMENTO' : i + 'º NA FILA'}</span>
                            <h3 class="text-lg font-black mt-1 leading-tight">${item.loja}</h3>
                            <p class="text-[11px] text-slate-400 mt-1">${item.enderecoLoja}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            ${item.status !== 'Atendendo' ? 
                                `<button onclick="atender('${d.id}')" class="bg-blue-600 px-3 py-2 rounded-xl font-bold text-[10px]">ATENDER</button>` :
                                `<button onclick="concluir('${d.id}')" class="bg-green-600 px-3 py-2 rounded-xl font-bold text-[10px]">CONCLUIR</button>`
                            }
                            <a href="https://wa.me/55${item.zap}" class="bg-emerald-600 p-2 rounded-xl text-center text-[10px] font-bold">ZAP LOJA</a>
                        </div>
                    </div>
                `;
                container.appendChild(div);
                i++;
            });
        });

        window.atender = (id) => updateDoc(doc(db, 'chamadas', id), { status: 'Atendendo' });
        window.concluir = (id) => confirm("Finalizar esta entrega?") && deleteDoc(doc(db, 'chamadas', id));
    </script>
</body>
</html>
