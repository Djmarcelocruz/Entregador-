<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Marcelo - Logística</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <div class="max-w-md mx-auto p-4">
        <div class="bg-slate-800 rounded-3xl p-6 shadow-2xl border border-slate-700 mb-6">
            <div id="statusVisual" class="text-center mb-6">
                <span id="labelStatus" class="text-3xl font-black block">CARREGANDO...</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="updateStatus('disponivel')" class="flex flex-col items-center p-3 bg-green-600 rounded-2xl active:scale-95">🟢 LIVRE</button>
                <button onclick="updateStatus('ocupado')" class="flex flex-col items-center p-3 bg-orange-600 rounded-2xl active:scale-95">🟡 EM ROTA</button>
                <button onclick="updateStatus('offline')" class="flex flex-col items-center p-3 bg-red-600 rounded-2xl active:scale-95">🔴 SAIR</button>
            </div>
        </div>

        <h2 class="text-lg font-black mb-4">📋 Fila de Espera</h2>
        <div id="listaFila" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.updateStatus = (s) => {
            let label = s === 'disponivel' ? 'DISPONÍVEL' : s === 'ocupado' ? 'EM ROTA' : 'OFFLINE';
            setDoc(doc(db, 'config', 'status'), { label, online: s!=='offline' }, { merge: true });
        };

        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data();
            const el = document.getElementById('labelStatus');
            el.textContent = data.label;
            el.className = `text-3xl font-black block ${data.label === 'DISPONÍVEL' ? 'text-green-500' : data.label === 'EM ROTA' ? 'text-orange-500' : 'text-red-500'}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            const container = document.getElementById('listaFila');
            container.innerHTML = snap.empty ? '<p class="text-slate-500 text-center py-10">Fila vazia</p>' : '';
            let i = 1;
            snap.forEach(d => {
                const item = d.data();
                const div = document.createElement('div');
                div.className = `bg-slate-800 p-4 rounded-2xl border-l-4 ${item.status === 'Atendendo' ? 'border-blue-500' : 'border-slate-600'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold bg-slate-700 px-2 py-1 rounded">${item.status === 'Atendendo' ? '🚀 EM ANDAMENTO' : i + 'º NA FILA'}</span>
                            <h3 class="text-xl font-black mt-1">${item.loja}</h3>
                            <p class="text-xs text-slate-400">${item.enderecoLoja}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            ${item.status !== 'Atendendo' ? 
                                `<button onclick="atender('${d.id}')" class="bg-blue-600 px-4 py-2 rounded-xl font-bold text-xs">ATENDER</button>` :
                                `<button onclick="concluir('${d.id}')" class="bg-green-600 px-4 py-2 rounded-xl font-bold text-xs">CONCLUIR</button>`
                            }
                            <a href="https://wa.me/${item.zap}" class="bg-emerald-600 p-2 rounded-xl text-center text-xs font-bold">ZAP</a>
                        </div>
                    </div>
                `;
                container.appendChild(div);
                i++;
            });
        });

        window.atender = (id) => updateDoc(doc(db, 'chamadas', id), { status: 'Atendendo' });
        window.concluir = (id) => confirm("Entrega finalizada?") && deleteDoc(doc(db, 'chamadas', id));
    </script>
</body>
</html>
