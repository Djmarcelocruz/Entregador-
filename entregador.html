<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Marcelo - Logística</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <audio id="alarme" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="max-w-md mx-auto p-4">
        <div class="bg-slate-800 rounded-3xl p-4 mb-4 border border-slate-700">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Meu WhatsApp (Ex: 14996919053)</p>
            <div class="flex gap-2">
                <input id="meuZap" type="tel" class="flex-1 bg-slate-900 border border-slate-600 rounded-xl p-2 text-sm font-bold outline-none focus:border-blue-500">
                <button onclick="salvarMeuZap()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">Salvar</button>
            </div>
        </div>

        <div class="bg-slate-800 rounded-3xl p-6 shadow-2xl border border-slate-700 mb-6">
            <div id="statusVisual" class="text-center mb-6">
                <span id="labelStatus" class="text-3xl font-black block">CARREGANDO...</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="updateStatus('disponivel')" class="p-3 bg-green-600 rounded-2xl font-bold text-[10px]">🟢 LIVRE</button>
                <button onclick="updateStatus('ocupado')" class="p-3 bg-orange-600 rounded-2xl font-bold text-[10px]">🟡 EM ROTA</button>
                <button onclick="updateStatus('offline')" class="p-3 bg-red-600 rounded-2xl font-bold text-[10px]">🔴 SAIR</button>
            </div>
        </div>

        <h2 class="text-lg font-black mb-4 flex justify-between items-center">
            <span>📋 Fila de Espera</span>
            <span id="badgeFila" class="text-xs bg-slate-700 px-2 py-1 rounded-full">0</span>
        </h2>
        <div id="listaFila" class="space-y-3 text-slate-900"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const som = document.getElementById('alarme');

        // Configurações do Marcelo
        async function init() {
            const s = await getDoc(doc(db, 'config', 'status'));
            if(s.exists()) document.getElementById('meuZap').value = s.data().meuWhatsApp || "";
        }
        window.salvarMeuZap = () => {
            const zap = document.getElementById('meuZap').value.replace(/\D/g,'');
            setDoc(doc(db, 'config', 'status'), { meuWhatsApp: zap }, { merge: true });
            alert("WhatsApp salvo!");
        };

        window.updateStatus = (s) => {
            let label = s === 'disponivel' ? 'DISPONÍVEL' : s === 'ocupado' ? 'EM ROTA' : 'OFFLINE';
            setDoc(doc(db, 'config', 'status'), { label, online: s!=='offline' }, { merge: true });
        };

        // Escutar Status e Fila
        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data() || { label: 'OFFLINE' };
            const el = document.getElementById('labelStatus');
            el.textContent = data.label;
            el.className = `text-3xl font-black block ${data.label === 'DISPONÍVEL' ? 'text-green-500' : data.label === 'EM ROTA' ? 'text-orange-500' : 'text-red-500'}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            const container = document.getElementById('listaFila');
            document.getElementById('badgeFila').textContent = snap.size;
            container.innerHTML = '';
            
            let temPendente = false;
            let i = 1;

            snap.forEach(d => {
                const item = d.data();
                if(item.status === 'Pendente') temPendente = true;

                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-2xl border-l-8 ${item.status === 'Atendendo' ? 'border-blue-500 shadow-lg' : 'border-slate-300'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <span class="text-[9px] font-bold text-slate-400 uppercase">${item.status === 'Atendendo' ? '🚀 Em Atendimento' : i + 'º na fila'}</span>
                            <h3 class="text-lg font-black leading-tight">${item.loja}</h3>
                            <p class="text-[11px] text-slate-500">${item.enderecoLoja}</p>
                        </div>
                        <div class="flex flex-col gap-2 ml-2">
                            ${item.status !== 'Atendendo' ? 
                                `<button onclick="atender('${d.id}')" class="bg-blue-600 text-white px-3 py-2 rounded-xl font-bold text-[10px]">ATENDER</button>` :
                                `<button onclick="concluir('${d.id}')" class="bg-green-600 text-white px-3 py-2 rounded-xl font-bold text-[10px]">CONCLUIR</button>`
                            }
                            <a href="https://wa.me/55${item.zap}" class="bg-emerald-100 text-emerald-700 p-2 rounded-xl text-center text-[10px] font-bold">LOJA</a>
                        </div>
                    </div>
                `;
                container.appendChild(div);
                i++;
            });

            // Gerenciar Alarme
            if(temPendente) {
                som.play().catch(() => {});
                if ("vibrate" in navigator) navigator.vibrate([500, 300, 500]);
            } else {
                som.pause();
                som.currentTime = 0;
            }
        });

        window.atender = (id) => updateDoc(doc(db, 'chamadas', id), { status: 'Atendendo' });
        window.concluir = (id) => confirm("Finalizar entrega?") && deleteDoc(doc(db, 'chamadas', id));
        init();
    </script>
</body>
</html>
