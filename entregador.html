<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Marcelo - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <audio id="alarme" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="max-w-md mx-auto p-4">
        <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl p-6 mb-6 shadow-xl text-center">
            <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest">Total de Entregas Hoje</p>
            <h1 id="totalGeralDia" class="text-6xl font-black">0</h1>
        </div>

        <div class="bg-slate-800 rounded-3xl p-4 mb-6 border border-slate-700">
            <div id="labelStatus" class="text-center text-xl font-black mb-4 text-slate-500">OFFLINE</div>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="updateStatus('disponivel')" class="p-2 bg-green-600 rounded-xl font-bold text-[10px]">🟢 LIVRE</button>
                <button onclick="updateStatus('ocupado')" class="p-2 bg-orange-600 rounded-xl font-bold text-[10px]">🟡 EM ROTA</button>
                <button onclick="updateStatus('offline')" class="p-2 bg-red-600 rounded-xl font-bold text-[10px]">🔴 SAIR</button>
            </div>
            <div class="flex gap-2 border-t border-slate-700 pt-4">
                <input id="meuZap" type="tel" placeholder="Seu WhatsApp" class="flex-1 bg-slate-900 border border-slate-600 rounded-xl p-2 text-xs font-bold outline-none">
                <button onclick="salvarMeuZap()" class="bg-slate-700 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Salvar</button>
            </div>
        </div>

        <h2 class="text-lg font-black mb-4">🏪 Lojas em Atendimento</h2>
        <div id="listaFila" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const som = document.getElementById('alarme');

        async function init() {
            const s = await getDoc(doc(db, 'config', 'status'));
            if(s.exists()) document.getElementById('meuZap').value = s.data().meuWhatsApp || "";
        }

        window.salvarMeuZap = () => {
            const zap = document.getElementById('meuZap').value.replace(/\D/g,'');
            setDoc(doc(db, 'config', 'status'), { meuWhatsApp: zap }, { merge: true });
            alert("WhatsApp Atualizado!");
        };

        window.updateStatus = (s) => {
            let label = s === 'disponivel' ? 'DISPONÍVEL' : s === 'ocupado' ? 'EM ROTA' : 'OFFLINE';
            setDoc(doc(db, 'config', 'status'), { label, online: s!=='offline' }, { merge: true });
        };

        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data() || { label: 'OFFLINE' };
            const el = document.getElementById('labelStatus');
            el.textContent = data.label;
            el.className = `text-center text-xl font-black mb-4 ${data.label === 'DISPONÍVEL' ? 'text-green-500' : data.label === 'EM ROTA' ? 'text-orange-500' : 'text-red-500'}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            const container = document.getElementById('listaFila');
            container.innerHTML = '';
            let totalGeral = 0;
            let temPendente = false;

            snap.forEach(d => {
                const item = d.data();
                const contagem = item.contagem || 0;
                totalGeral += contagem;
                if(contagem === 0) temPendente = true;

                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl shadow-lg text-slate-900 border-b-4 border-blue-600";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex-1">
                            <h3 class="text-xl font-black leading-tight">${item.loja}</h3>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">${item.enderecoLoja}</p>
                            <div class="mt-2 flex items-baseline gap-1">
                                <span class="text-4xl font-black text-blue-700">${contagem}</span>
                                <span class="text-xs font-bold text-slate-400 uppercase">corridas</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="addEntrega('${d.id}', ${contagem})" class="bg-green-500 text-white w-16 h-16 rounded-2xl shadow-lg shadow-green-200 flex items-center justify-center text-3xl font-black active:scale-90 transition-all">+</button>
                            <button onclick="fecharLoja('${d.id}', '${item.loja}', ${contagem})" class="text-[9px] font-black text-red-500 uppercase mt-2">Encerrar</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('totalGeralDia').textContent = totalGeral;
            if(temPendente) { som.play().catch(()=>{}); } else { som.pause(); som.currentTime = 0; }
        });

        window.addEntrega = (id, atual) => updateDoc(doc(db, 'chamadas', id), { contagem: atual + 1 });
        window.fecharLoja = (id, nome, total) => confirm(`Fechar expediente da ${nome} com ${total} entregas?`) && deleteDoc(doc(db, 'chamadas', id));
        init();
    </script>
</body>
</html>
