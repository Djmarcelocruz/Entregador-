<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Marcelo - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <audio id="alarme" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="max-w-md mx-auto p-4">
        <div class="bg-blue-600 rounded-3xl p-6 mb-6 shadow-xl text-center border-b-4 border-blue-800">
            <p class="text-blue-200 text-[10px] font-bold uppercase tracking-widest">Total Geral do Dia</p>
            <h1 id="totalGeralDia" class="text-6xl font-black">0</h1>
        </div>

        <div class="bg-slate-800 rounded-3xl p-4 mb-6 border border-slate-700">
            <div id="labelStatus" class="text-center text-xl font-black mb-3 italic uppercase">CARREGANDO...</div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="updateStatus('disponivel')" class="p-2 bg-green-600 rounded-xl font-bold text-[10px]">🟢 LIVRE</button>
                <button onclick="updateStatus('ocupado')" class="p-2 bg-orange-600 rounded-xl font-bold text-[10px]">🟡 EM ROTA</button>
                <button onclick="updateStatus('offline')" class="p-2 bg-red-600 rounded-xl font-bold text-[10px]">🔴 SAIR</button>
            </div>
        </div>

        <h2 class="text-lg font-black mb-4">📋 Lojas Ativas</h2>
        <div id="listaFila" class="space-y-4 text-slate-900"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const som = document.getElementById('alarme');

        window.updateStatus = (s) => {
            let label = s === 'disponivel' ? 'DISPONÍVEL' : s === 'ocupado' ? 'EM ROTA' : 'OFFLINE';
            setDoc(doc(db, 'config', 'status'), { label, online: s!=='offline' }, { merge: true });
        };

        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data() || { label: 'OFFLINE' };
            const el = document.getElementById('labelStatus');
            el.textContent = data.label;
            el.className = `text-center text-xl font-black mb-3 ${data.label === 'DISPONÍVEL' ? 'text-green-400' : data.label === 'EM ROTA' ? 'text-orange-400' : 'text-red-400'}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            const container = document.getElementById('listaFila');
            container.innerHTML = '';
            let totalGeral = 0;
            let temAlerta = false;

            snap.forEach(d => {
                const item = d.data();
                totalGeral += (item.contagem || 0);
                if(item.alertaColeta === true) temAlerta = true;

                const div = document.createElement('div');
                div.className = `bg-white p-5 rounded-[32px] shadow-lg border-l-[14px] transition-all ${item.alertaColeta ? 'border-orange-500 ring-4 ring-orange-500/20' : 'border-blue-600'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex-1">
                            <h3 class="text-xl font-black leading-tight">${item.loja}</h3>
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-2">${item.enderecoLoja}</p>
                            <div class="flex items-center gap-3">
                                <button onclick="ajustar('${d.id}', -1, ${item.contagem || 0})" class="w-10 h-10 bg-slate-100 rounded-xl text-slate-400 font-black text-xl">-</button>
                                <span class="text-4xl font-black text-blue-700">${item.contagem || 0}</span>
                                <button onclick="ajustar('${d.id}', 1, ${item.contagem || 0})" class="w-14 h-14 bg-green-500 text-white rounded-2xl shadow-lg font-black text-3xl active:scale-90 transition-all">+</button>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-3">
                            <button onclick="visto('${d.id}')" class="${item.alertaColeta ? 'bg-orange-500 animate-pulse' : 'bg-slate-200'} text-white w-12 h-12 rounded-2xl flex items-center justify-center text-xl">
                                ${item.alertaColeta ? '🔔' : '✅'}
                            </button>
                            <button onclick="fecharLoja('${d.id}', '${item.loja}', ${item.contagem || 0})" class="text-[9px] font-bold text-red-400 uppercase">Finalizar</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('totalGeralDia').textContent = totalGeral;
            
            if(temAlerta) { 
                som.play().catch(()=>{}); 
                if ("vibrate" in navigator) navigator.vibrate([500, 200, 500]);
            } else { 
                som.pause(); 
                som.currentTime = 0; 
            }
        });

        window.ajustar = (id, valor, atual) => {
            const novo = atual + valor;
            updateDoc(doc(db, 'chamadas', id), { contagem: novo < 0 ? 0 : novo, alertaColeta: false });
        };
        window.visto = (id) => updateDoc(doc(db, 'chamadas', id), { alertaColeta: false });
        window.fecharLoja = (id, nome, total) => confirm(`Encerrar ${nome} com ${total} entregas?`) && deleteDoc(doc(db, 'chamadas', id));
    </script>
</body>
</html>
