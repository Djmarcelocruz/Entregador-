<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Marcelo - Logística</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJnameIjogIk1hcmNlbG8gRW50cmVnYXMiLAogICJzaG9ydF9uYW1lIjogIk1hcmNlbG8iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzFmMjkzNyIsCiAgInRoZW1lX2NvbG9yIjogIiMxZjI5MzciCn0=">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <div class="max-w-md mx-auto p-4">
        <div class="bg-slate-800 rounded-3xl p-6 shadow-2xl border border-slate-700 mb-6">
            <p class="text-center text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Gerenciar Minha Disponibilidade</p>
            
            <div id="statusVisual" class="text-center mb-6">
                <span id="labelStatus" class="text-3xl font-black block">OFFLINE</span>
                <span id="subLabelStatus" class="text-sm opacity-60">As lojas não podem te chamar</span>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <button onclick="updateStatus('disponivel')" class="flex flex-col items-center p-3 bg-green-600 rounded-2xl active:scale-95 transition-all">
                    <span class="text-xl">🟢</span>
                    <span class="text-[10px] font-bold mt-1">LIVRE</span>
                </button>
                <button onclick="updateStatus('ocupado')" class="flex flex-col items-center p-3 bg-orange-600 rounded-2xl active:scale-95 transition-all">
                    <span class="text-xl">🟡</span>
                    <span class="text-[10px] font-bold mt-1">EM ROTA</span>
                </button>
                <button onclick="updateStatus('offline')" class="flex flex-col items-center p-3 bg-red-600 rounded-2xl active:scale-95 transition-all">
                    <span class="text-xl">🔴</span>
                    <span class="text-[10px] font-bold mt-1">SAIR</span>
                </button>
            </div>
        </div>

        <div class="mb-6">
            <h2 class="text-lg font-black mb-4 flex items-center gap-2">
                <span>📋 Fila de Chamados</span>
                <span id="countFila" class="bg-blue-600 text-xs px-2 py-1 rounded-full">0</span>
            </h2>
            
            <div id="listaFila" class="space-y-3">
                <p class="text-slate-500 text-center py-10 italic">Nenhum chamado pendente...</p>
            </div>
        </div>
    </div>

    <audio id="somAlerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // SUA CONFIGURAÇÃO ATUAL
        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÃO PARA ATUALIZAR STATUS
        window.updateStatus = async (status) => {
            const statusRef = doc(db, 'config', 'status');
            let data = { online: false, ocupado: false, label: 'OFFLINE' };

            if(status === 'disponivel') data = { online: true, ocupado: false, label: 'DISPONÍVEL' };
            if(status === 'ocupado') data = { online: true, ocupado: true, label: 'EM ROTA' };

            await setDoc(statusRef, data, { merge: true });
        };

        // ESCUTAR MUDANÇAS DE STATUS (PARA VOCÊ VER)
        onSnapshot(doc(db, 'config', 'status'), (snap) => {
            const s = snap.data();
            const label = document.getElementById('labelStatus');
            const sub = document.getElementById('subLabelStatus');
            label.textContent = s.label;
            
            if(s.label === 'DISPONÍVEL') label.className = "text-3xl font-black block text-green-500";
            if(s.label === 'EM ROTA') label.className = "text-3xl font-black block text-orange-500";
            if(s.label === 'OFFLINE') label.className = "text-3xl font-black block text-red-500";
        });

        // GERENCIAR FILA EM TEMPO REAL
        const qFila = query(collection(db, 'chamadas'), orderBy('hora', 'asc'));
        onSnapshot(qFila, (snap) => {
            const container = document.getElementById('listaFila');
            const count = document.getElementById('countFila');
            count.textContent = snap.size;

            if(snap.empty) {
                container.innerHTML = `<p class="text-slate-500 text-center py-10 italic">Fila vazia...</p>`;
                return;
            }

            container.innerHTML = '';
            let index = 1;

            snap.forEach((docSnap) => {
                const item = docSnap.data();
                const id = docSnap.id;
                
                const card = document.createElement('div');
                card.className = "bg-slate-800 p-4 rounded-2xl border-l-4 " + (index === 1 ? "border-green-500 shadow-lg shadow-green-500/10" : "border-slate-600");
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-black bg-slate-700 px-2 py-1 rounded mb-1 inline-block">${index}º DA FILA</span>
                            <h3 class="text-xl font-black">${item.loja}</h3>
                            <p class="text-xs text-slate-400">${item.enderecoLoja || 'Endereço não informado'}</p>
                        </div>
                        <button onclick="concluirChamado('${id}')" class="bg-blue-600 p-3 rounded-xl font-bold text-sm active:scale-95">
                            ATENDER
                        </button>
                    </div>
                `;
                container.appendChild(card);
                index++;
            });
            
            // Tocar som se entrar novo chamado
            if (!snap.metadata.hasPendingWrites) document.getElementById('somAlerta').play();
        });

        window.concluirChamado = async (id) => {
            if(confirm("Confirmar atendimento desta loja?")) {
                await deleteDoc(doc(db, 'chamadas', id));
            }
        };

    </script>
</body>
</html>
