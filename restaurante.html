<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restaurante - Marcelo Entregas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* Login */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box {
            background: #1e293b;
            border: 2px solid #3b82f6;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 { font-size: 28px; margin-bottom: 10px; text-align: center; }
        .login-box p { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: #2563eb; }
        .demo-creds {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
        }
        
        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            padding: 20px 15px;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 22px; }
        .header p { font-size: 12px; color: #dbeafe; }
        .btn-logout { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .card-icon { font-size: 28px; margin-bottom: 5px; }
        .card-label { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
        .card-value { font-size: 24px; font-weight: bold; }
        
        /* Sections */
        .section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .section h2 { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* List Items */
        .list-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item-info { flex: 1; }
        .list-item-title { font-weight: bold; margin-bottom: 3px; }
        .list-item-subtitle { font-size: 12px; color: #94a3b8; }
        .list-item-value { font-size: 18px; font-weight: bold; color: #3b82f6; }
        
        /* Buttons */
        .btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn:hover { background: #2563eb; }
        .btn-small { padding: 8px 12px; font-size: 12px; }
        
        /* Forms */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        /* Empty State */
        .empty-state { text-align: center; color: #64748b; padding: 30px 15px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border-radius: 12px; padding: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-close { float: right; font-size: 24px; cursor: pointer; color: #94a3b8; }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🍽️ Restaurante</h1>
        <p>Marcelo Entregas</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
        
        <div class="demo-creds">
            <strong>Teste:</strong><br>
            Email: loja@test.com<br>
            Senha: 123456
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <!-- Header -->
    <div class="header">
        <div>
            <h1>🍽️ Restaurante</h1>
            <p id="nomeUsuario">Bem-vindo!</p>
        </div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="container">
        <!-- Stats Cards -->
        <div class="cards-grid">
            <div class="card">
                <div class="card-icon">📦</div>
                <div class="card-label">Pedidos</div>
                <div class="card-value" id="totalPedidos">0</div>
            </div>
            <div class="card">
                <div class="card-icon">✓</div>
                <div class="card-label">Entregues</div>
                <div class="card-value" id="totalEntregues">0</div>
            </div>
            <div class="card">
                <div class="card-icon">⏳</div>
                <div class="card-label">Andamento</div>
                <div class="card-value" id="totalAndamento">0</div>
            </div>
        </div>

        <!-- Chamar Motoboy -->
        <div class="section">
            <h2>📞 Chamar Motoboy</h2>
            <div class="form-group">
                <label>Nome do Cliente</label>
                <input type="text" id="nomeCliente" placeholder="Ex: Maria Silva">
            </div>
            <div class="form-group">
                <label>Endereço de Entrega</label>
                <input type="text" id="enderecoEntrega" placeholder="Ex: Rua A, 123">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Valor</label>
                    <input type="number" id="valorEntrega" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="telefoneMotoboy" placeholder="11999999999">
                </div>
            </div>
            <button class="btn" style="width: 100%;" onclick="chamarMotoboy()">📞 CHAMAR MOTOBOY</button>
        </div>

        <!-- Pedidos em Andamento -->
        <div class="section">
            <h2>🚚 Pedidos em Andamento</h2>
            <div id="pedidosAndamentoList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Nenhum pedido em andamento</p>
                </div>
            </div>
        </div>

        <!-- Histórico -->
        <div class="section">
            <h2>📜 Histórico de Pedidos</h2>
            <div id="historicoList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Nenhum pedido no histórico</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let usuarioAtual = null;

    // Fazer Login
    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            alert('Preencha email e senha!');
            return;
        }

        usuarioAtual = {
            email: email,
            nome: email.split('@')[0],
            id: Math.random().toString(36).substr(2, 9)
        };

        localStorage.setItem('usuarioRestaurante', JSON.stringify(usuarioAtual));
        mostrarDashboard();
        carregarDados();
    }

    // Fazer Logout
    function fazerLogout() {
        if (confirm('Deseja sair?')) {
            usuarioAtual = null;
            localStorage.removeItem('usuarioRestaurante');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    }

    // Mostrar Dashboard
    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('nomeUsuario').textContent = `Bem-vindo, ${usuarioAtual.nome}!`;
    }

    // Chamar Motoboy
    function chamarMotoboy() {
        const cliente = document.getElementById('nomeCliente').value;
        const endereco = document.getElementById('enderecoEntrega').value;
        const valor = document.getElementById('valorEntrega').value;
        const telefone = document.getElementById('telefoneMotoboy').value;

        if (!cliente || !endereco || !valor) {
            alert('Preencha todos os campos obrigatórios!');
            return;
        }

        const pedido = {
            id: Math.random().toString(36).substr(2, 9),
            cliente: cliente,
            endereco: endereco,
            valor: parseFloat(valor),
            telefone: telefone,
            status: 'aguardando',
            data: new Date().toLocaleString('pt-BR')
        };

        let pedidos = JSON.parse(localStorage.getItem('pedidosRestaurante') || '[]');
        pedidos.push(pedido);
        localStorage.setItem('pedidosRestaurante', JSON.stringify(pedidos));

        alert(`✓ Motoboy chamado para ${cliente}!\nEndereço: ${endereco}\nValor: R$ ${valor}`);

        document.getElementById('nomeCliente').value = '';
        document.getElementById('enderecoEntrega').value = '';
        document.getElementById('valorEntrega').value = '';
        document.getElementById('telefoneMotoboy').value = '';

        carregarDados();
    }

    // Carregar Dados
    function carregarDados() {
        const pedidos = JSON.parse(localStorage.getItem('pedidosRestaurante') || '[]');
        renderizarPedidos(pedidos);
        renderizarHistorico(pedidos);
        atualizarEstatisticas(pedidos);
    }

    // Renderizar Pedidos em Andamento
    function renderizarPedidos(pedidos) {
        const lista = document.getElementById('pedidosAndamentoList');
        const ativos = pedidos.filter(p => p.status !== 'entregue');
        
        if (ativos.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum pedido em andamento</p></div>';
            return;
        }

        lista.innerHTML = ativos.map(p => `
            <div class="list-item">
                <div class="list-item-info">
                    <div class="list-item-title">${p.cliente}</div>
                    <div class="list-item-subtitle">${p.endereco}</div>
                </div>
                <div style="text-align: right;">
                    <div class="list-item-value">R$ ${p.valor.toFixed(2)}</div>
                    <button class="btn btn-small" onclick="acompanharPedido('${p.id}')">Acompanhar</button>
                </div>
            </div>
        `).join('');
    }

    // Renderizar Histórico
    function renderizarHistorico(pedidos) {
        const lista = document.getElementById('historicoList');
        const entregues = pedidos.filter(p => p.status === 'entregue');
        
        if (entregues.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum pedido entregue</p></div>';
            return;
        }

        lista.innerHTML = entregues.map(p => `
            <div class="list-item">
                <div class="list-item-info">
                    <div class="list-item-title">${p.cliente}</div>
                    <div class="list-item-subtitle">${p.data}</div>
                </div>
                <div style="text-align: right;">
                    <div class="list-item-value">R$ ${p.valor.toFixed(2)}</div>
                    <span style="display: inline-block; background: #10b981; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">✓ Entregue</span>
                </div>
            </div>
        `).join('');
    }

    // Atualizar Estatísticas
    function atualizarEstatisticas(pedidos) {
        document.getElementById('totalPedidos').textContent = pedidos.length;
        document.getElementById('totalAndamento').textContent = pedidos.filter(p => p.status !== 'entregue').length;
        document.getElementById('totalEntregues').textContent = pedidos.filter(p => p.status === 'entregue').length;
    }

    // Acompanhar Pedido
    function acompanharPedido(id) {
        alert('📍 Acompanhando pedido ' + id + '...\nMotoboy está a caminho!');
    }

    // Verificar login ao carregar
    window.addEventListener('load', function() {
        const usuario = localStorage.getItem('usuarioRestaurante');
        if (usuario) {
            usuarioAtual = JSON.parse(usuario);
            mostrarDashboard();
            carregarDados();
        }
    });

    // Atualizar dados a cada 10 segundos
    setInterval(function() {
        if (usuarioAtual) {
            carregarDados();
        }
    }, 10000);
</script>

</body>
</html>
