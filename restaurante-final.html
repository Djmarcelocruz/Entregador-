<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Restaurante - Marcelo Entregas Pro</title>
    <link rel="manifest" href="data:application/manifest+json,{\"name\":\"Marcelo Entregas\",\"short_name\":\"Entregas\",\"start_url\":\"/\",\"display\":\"standalone\",\"background_color\":\"#0f172a\",\"theme_color\":\"#3b82f6\",\"icons\":[]}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        html, body { height: 100%; width: 100%; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* LOGIN */
        .login-screen { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 15px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .login-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #3b82f6;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-box h1 { font-size: 32px; margin-bottom: 10px; text-align: center; }
        .login-box p { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { 
            width: 100%; 
            padding: 14px; 
            background: #0f172a; 
            border: 2px solid #334155; 
            border-radius: 10px; 
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; background: #1e293b; }
        .btn-login { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4); }
        .demo-creds {
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid #3b82f6;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
        }
        
        /* DASHBOARD */
        .dashboard { display: none; flex-direction: column; height: 100vh; }
        .dashboard.active { display: flex; }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .header-left h1 { font-size: 20px; margin-bottom: 2px; }
        .header-left p { font-size: 11px; color: #dbeafe; }
        .header-right { display: flex; gap: 10px; }
        .btn-logout { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
        }
        .btn-logout:hover { background: #b91c1c; }
        
        /* CONTENT */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* CARDS */
        .card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        /* MOTOBOYS */
        .motoboy-item {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .motoboy-item:hover { border-color: #3b82f6; }
        .motoboy-info { flex: 1; }
        .motoboy-name { font-weight: bold; margin-bottom: 3px; }
        .motoboy-status { font-size: 11px; color: #94a3b8; }
        .status-badge { 
            display: inline-block; 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: bold;
            margin-right: 8px;
        }
        .status-online { background: #10b981; color: #fff; }
        .btn-chamar { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
        }
        .btn-chamar:hover { transform: translateY(-2px); }
        .btn-chamar:disabled { background: #64748b; cursor: not-allowed; }
        
        /* FORM SIMPLIFICADO */
        .form-entregas {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #3b82f6;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .form-entregas.active { display: block; }
        .form-entregas h2 { font-size: 16px; margin-bottom: 12px; }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 12px; 
            background: #0f172a; 
            border: 2px solid #334155; 
            border-radius: 10px; 
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #3b82f6; 
            background: #1e293b;
        }
        .btn-add { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            transition: all 0.3s;
            font-size: 16px;
        }
        .btn-add:hover { transform: translateY(-2px); }
        .btn-cancel { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            font-size: 16px;
        }
        .btn-cancel:hover { transform: translateY(-2px); }
        
        /* LISTA ENTREGAS */
        .entregas-list {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .entregas-list.active { display: block; }
        .entrega-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .entrega-info { flex: 1; }
        .entrega-cliente { font-weight: bold; margin-bottom: 3px; }
        .entrega-details { font-size: 12px; color: #94a3b8; }
        .btn-remove { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 6px 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 11px;
            transition: all 0.3s;
        }
        .btn-remove:hover { background: #b91c1c; }
        .btn-finalizar { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            font-size: 16px;
        }
        .btn-finalizar:hover { transform: translateY(-2px); }
        
        /* ACOMPANHAMENTO */
        .acompanhamento {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #f59e0b;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .acompanhamento.active { display: block; }
        .status-item {
            background: #0f172a;
            border-left: 4px solid #f59e0b;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .status-text { font-weight: bold; margin-bottom: 3px; }
        .status-endereco { font-size: 12px; color: #94a3b8; }
        
        /* NOTIFICAÇÃO */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            display: none;
        }
        .notification.show { display: block; }
        @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }
        
        /* EMPTY STATE */
        .empty-state { text-align: center; color: #64748b; padding: 20px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
        
        /* RESPONSIVE */
        @media (max-width: 600px) {
            .header { padding: 12px; }
            .content { padding: 12px; }
            .card { padding: 12px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🍽️</h1>
        <h1>Restaurante</h1>
        <p>Marcelo Entregas Pro</p>
        
        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label>🔐 Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
        
        <div class="demo-creds">
            <strong>🧪 Teste:</strong><br>
            loja@test.com<br>
            123456
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="header">
        <div class="header-left">
            <h1>🍽️ Restaurante</h1>
            <p id="nomeUsuario">Bem-vindo!</p>
        </div>
        <div class="header-right">
            <button class="btn-logout" onclick="fazerLogout()">Sair</button>
        </div>
    </div>

    <div class="content">
        <!-- MOTOBOYS ONLINE -->
        <div class="card">
            <h2>🏍️ Motoboys Disponíveis</h2>
            <div id="motoboys-list">
                <div class="empty-state">
                    <div class="empty-state-icon">🚫</div>
                    <p>Nenhum motoboy online</p>
                </div>
            </div>
        </div>

        <!-- FORM ENTREGAS -->
        <div class="form-entregas" id="form-entregas">
            <h2>📦 Adicionar Entrega</h2>
            
            <div class="form-group">
                <label>👤 Nome do Cliente</label>
                <input type="text" id="cliente" placeholder="Ex: João Silva">
            </div>
            
            <div class="form-group">
                <label>📍 Endereço</label>
                <input type="text" id="endereco" placeholder="Ex: Rua das Flores, 123">
            </div>
            
            <div class="form-group">
                <label>📞 Número (WhatsApp)</label>
                <input type="tel" id="numero" placeholder="Ex: 11999999999">
            </div>
            
            <div class="form-group">
                <label>💳 Forma de Pagamento</label>
                <select id="pagamento">
                    <option value="">Selecione...</option>
                    <option value="pix">💜 Pix</option>
                    <option value="dinheiro">💵 Dinheiro</option>
                    <option value="cartao">💳 Cartão</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>🔄 Troco (se dinheiro)</label>
                <input type="number" id="troco" placeholder="Ex: 10.00" step="0.01">
            </div>
            
            <button class="btn-add" onclick="adicionarEntrega()">➕ ADICIONAR</button>
            <button class="btn-cancel" onclick="cancelarChamado()">❌ CANCELAR</button>
        </div>

        <!-- LISTA ENTREGAS -->
        <div class="entregas-list" id="entregas-list">
            <h2>📋 Entregas (<span id="total-entregas">0</span>)</h2>
            <div id="lista-entregas"></div>
            <button class="btn-finalizar" onclick="finalizarLote()">✓ ENVIAR PARA MOTOBOY</button>
        </div>

        <!-- ACOMPANHAMENTO -->
        <div class="acompanhamento" id="acompanhamento">
            <h2>🚚 Acompanhamento em Tempo Real</h2>
            <div id="acompanhamento-list"></div>
        </div>
    </div>
</div>

<!-- NOTIFICAÇÃO -->
<div class="notification" id="notification"></div>

<script>
    let usuarioAtual = null;
    let motoboyAtual = null;
    let entregasAdicionadas = [];
    let chamadoAtivo = null;

    function mostrarNotificacao(mensagem, tipo = 'sucesso') {
        const notif = document.getElementById('notification');
        notif.textContent = mensagem;
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 3000);
    }

    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            mostrarNotificacao('❌ Preencha email e senha!');
            return;
        }

        usuarioAtual = {
            email: email,
            nome: email.split('@')[0],
            id: Math.random().toString(36).substr(2, 9),
            tipo: 'restaurante'
        };

        localStorage.setItem('usuarioRestaurante', JSON.stringify(usuarioAtual));
        mostrarDashboard();
        carregarMotoboys();
    }

    function fazerLogout() {
        if (confirm('Deseja sair?')) {
            usuarioAtual = null;
            localStorage.removeItem('usuarioRestaurante');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    }

    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('nomeUsuario').textContent = `${usuarioAtual.nome.toUpperCase()}`;
    }

    function carregarMotoboys() {
        let motoboys = [
            { id: 1, nome: 'Marcelo', status: 'online', telefone: '11999999999' },
            { id: 2, nome: 'João', status: 'online', telefone: '11988888888' },
            { id: 3, nome: 'Pedro', status: 'offline', telefone: '11977777777' }
        ];

        const lista = document.getElementById('motoboys-list');
        const motoboyOnline = motoboys.filter(m => m.status === 'online');

        if (motoboyOnline.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🚫</div><p>Nenhum motoboy disponível</p></div>';
            return;
        }

        lista.innerHTML = motoboyOnline.map(m => `
            <div class="motoboy-item">
                <div class="motoboy-info">
                    <div class="motoboy-name">🏍️ ${m.nome}</div>
                    <div class="motoboy-status">
                        <span class="status-badge status-online">🟢 Online</span>
                        ${m.telefone}
                    </div>
                </div>
                <button class="btn-chamar" onclick="chamarMotoboy(${m.id}, '${m.nome}')">CHAMAR</button>
            </div>
        `).join('');
    }

    function chamarMotoboy(id, nome) {
        motoboyAtual = { id, nome };
        chamadoAtivo = {
            id: Math.random().toString(36).substr(2, 9),
            restaurante_id: usuarioAtual.id,
            motoboy_id: id,
            motoboy_nome: nome,
            status: 'aguardando',
            entregas: [],
            data: new Date().toLocaleString('pt-BR')
        };

        entregasAdicionadas = [];
        document.getElementById('motoboys-list').parentElement.style.display = 'none';
        document.getElementById('form-entregas').classList.add('active');
        document.getElementById('entregas-list').classList.remove('active');
        document.getElementById('acompanhamento').classList.remove('active');
        mostrarNotificacao(`📞 Chamando ${nome}...`);
    }

    function adicionarEntrega() {
        const cliente = document.getElementById('cliente').value.trim();
        const endereco = document.getElementById('endereco').value.trim();
        const numero = document.getElementById('numero').value.trim();
        const pagamento = document.getElementById('pagamento').value;
        const troco = parseFloat(document.getElementById('troco').value) || 0;

        if (!cliente || !endereco || !numero || !pagamento) {
            mostrarNotificacao('❌ Preencha todos os campos!');
            return;
        }

        const entrega = {
            id: Math.random().toString(36).substr(2, 9),
            cliente,
            endereco,
            numero,
            pagamento,
            troco,
            sequencia: entregasAdicionadas.length + 1,
            status: 'aguardando'
        };

        entregasAdicionadas.push(entrega);
        mostrarNotificacao(`✓ Entrega de ${cliente} adicionada!`);

        document.getElementById('cliente').value = '';
        document.getElementById('endereco').value = '';
        document.getElementById('numero').value = '';
        document.getElementById('pagamento').value = '';
        document.getElementById('troco').value = '';

        renderizarEntregas();
    }

    function renderizarEntregas() {
        const lista = document.getElementById('lista-entregas');
        document.getElementById('total-entregas').textContent = entregasAdicionadas.length;
        
        if (entregasAdicionadas.length === 0) {
            lista.innerHTML = '<div class="empty-state"><p>Nenhuma entrega adicionada</p></div>';
            document.getElementById('entregas-list').classList.remove('active');
            return;
        }

        document.getElementById('entregas-list').classList.add('active');
        
        lista.innerHTML = entregasAdicionadas.map((e, idx) => `
            <div class="entrega-item">
                <div class="entrega-info">
                    <div class="entrega-cliente">${idx + 1}. ${e.cliente}</div>
                    <div class="entrega-details">📍 ${e.endereco} • 📞 ${e.numero}</div>
                    <div class="entrega-details">💳 ${e.pagamento.toUpperCase()}${e.troco > 0 ? ` • 🔄 R$ ${e.troco.toFixed(2)}` : ''}</div>
                </div>
                <button class="btn-remove" onclick="removerEntrega(${idx})">🗑️</button>
            </div>
        `).join('');
    }

    function removerEntrega(idx) {
        entregasAdicionadas.splice(idx, 1);
        renderizarEntregas();
    }

    function finalizarLote() {
        if (entregasAdicionadas.length === 0) {
            mostrarNotificacao('❌ Adicione pelo menos uma entrega!');
            return;
        }

        chamadoAtivo.entregas = entregasAdicionadas;

        let chamados = JSON.parse(localStorage.getItem('chamados') || '[]');
        chamados.push(chamadoAtivo);
        localStorage.setItem('chamados', JSON.stringify(chamados));

        mostrarNotificacao(`✓ ${entregasAdicionadas.length} entregas enviadas para ${motoboyAtual.nome}!`);

        document.getElementById('form-entregas').classList.remove('active');
        document.getElementById('entregas-list').classList.remove('active');
        document.getElementById('acompanhamento').classList.add('active');

        renderizarAcompanhamento();
    }

    function renderizarAcompanhamento() {
        const lista = document.getElementById('acompanhamento-list');
        
        lista.innerHTML = chamadoAtivo.entregas.map((e, idx) => `
            <div class="status-item">
                <div class="status-text">🚚 ${e.sequencia}. ${e.cliente}</div>
                <div class="status-endereco">📍 ${e.endereco}</div>
                <div class="status-endereco">📞 ${e.numero} • 💳 ${e.pagamento.toUpperCase()}</div>
            </div>
        `).join('');
    }

    function cancelarChamado() {
        if (confirm('Cancelar chamado?')) {
            entregasAdicionadas = [];
            motoboyAtual = null;
            chamadoAtivo = null;
            document.getElementById('form-entregas').classList.remove('active');
            document.getElementById('motoboys-list').parentElement.style.display = 'block';
            document.getElementById('cliente').value = '';
            document.getElementById('endereco').value = '';
            document.getElementById('numero').value = '';
            document.getElementById('pagamento').value = '';
            document.getElementById('troco').value = '';
            mostrarNotificacao('❌ Chamado cancelado');
        }
    }

    window.addEventListener('load', function() {
        const usuario = localStorage.getItem('usuarioRestaurante');
        if (usuario) {
            usuarioAtual = JSON.parse(usuario);
            mostrarDashboard();
            carregarMotoboys();
        }
    });

    setInterval(function() {
        if (usuarioAtual) {
            carregarMotoboys();
        }
    }, 5000);
</script>

</body>
</html>
