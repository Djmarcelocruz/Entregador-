<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rastreamento - Marcelo Entregas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #mapa { height: 400px; border-radius: 20px; }
        .historico-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <div class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-black mb-6">📍 Rastreamento em Tempo Real</h1>

        <!-- Status do Marcelo -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 rounded-3xl p-6 mb-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <p class="text-blue-200 text-xs font-bold uppercase">Status</p>
                    <h2 id="statusMarcelo" class="text-3xl font-black">OFFLINE</h2>
                </div>
                <div id="dotStatus" class="w-6 h-6 rounded-full bg-slate-300 animate-pulse"></div>
            </div>
            <p id="localMarcelo" class="text-sm text-blue-100">Aguardando localização...</p>
        </div>

        <!-- Mapa -->
        <div id="mapa" class="mb-6 shadow-lg border-4 border-slate-700"></div>

        <!-- Informações da Entrega Atual -->
        <div id="infoEntrega" class="hidden bg-slate-800 rounded-3xl p-6 mb-6 border border-slate-700">
            <h3 class="text-lg font-black mb-4">📦 Entrega Atual</h3>
            <div class="space-y-3">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold">Loja</p>
                    <p id="nomeLojaAtual" class="text-lg font-bold">-</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold">Endereço</p>
                    <p id="enderecoLojaAtual" class="text-sm">-</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold">Distância</p>
                    <p id="distancia" class="text-2xl font-black text-green-400">--</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold">Tempo Estimado</p>
                    <p id="tempoEstimado" class="text-lg font-bold">--</p>
                </div>
            </div>
        </div>

        <!-- Histórico de Localização -->
        <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700">
            <h3 class="text-lg font-black mb-4">📍 Histórico de Localização</h3>
            <div id="historicoLocalizacao" class="space-y-2 max-h-48 overflow-y-auto">
                <p class="text-slate-400 text-sm">Nenhuma localização registrada</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, limit, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getGeolocation } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Inicializar mapa
        let mapa = L.map('mapa').setView([-23.5505, -46.6333], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
        let marcadorMarcelo = null;
        let marcadorLoja = null;

        // Monitorar localização do Marcelo
        onSnapshot(doc(db, 'localizacao', 'marcelo'), (snap) => {
            const data = snap.data();
            if(data && data.lat && data.lng) {
                const lat = data.lat;
                const lng = data.lng;
                const timestamp = data.timestamp;

                // Atualizar mapa
                if(marcadorMarcelo) mapa.removeLayer(marcadorMarcelo);
                marcadorMarcelo = L.marker([lat, lng], {
                    icon: L.icon({
                        iconUrl: '🏍️',
                        iconSize: [40, 40]
                    })
                }).addTo(mapa).bindPopup('Marcelo Entregas');

                mapa.setView([lat, lng], 15);

                // Atualizar localização
                document.getElementById('localMarcelo').textContent = `Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`;
                document.getElementById('statusMarcelo').textContent = 'ONLINE';
                document.getElementById('dotStatus').className = 'w-6 h-6 rounded-full bg-green-500 shadow-lg shadow-green-500/50';

                // Adicionar ao histórico
                const historicoDiv = document.getElementById('historicoLocalizacao');
                const item = document.createElement('div');
                item.className = 'historico-item bg-slate-700 p-3 rounded-lg text-xs';
                const hora = new Date(timestamp?.toDate?.() || Date.now()).toLocaleTimeString('pt-BR');
                item.innerHTML = `<p class="font-bold">${hora}</p><p class="text-slate-300">Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}</p>`;
                historicoDiv.insertBefore(item, historicoDiv.firstChild);

                // Manter apenas últimas 10 localizações
                while(historicoDiv.children.length > 10) {
                    historicoDiv.removeChild(historicoDiv.lastChild);
                }
            }
        });

        // Monitorar chamados para mostrar endereço da loja
        onSnapshot(query(collection(db, 'chamadas'), limit(1)), (snap) => {
            snap.forEach(d => {
                const data = d.data();
                if(data) {
                    document.getElementById('infoEntrega').classList.remove('hidden');
                    document.getElementById('nomeLojaAtual').textContent = data.loja;
                    document.getElementById('enderecoLojaAtual').textContent = data.enderecoLoja;

                    // Adicionar marcador da loja no mapa (simulado)
                    if(marcadorLoja) mapa.removeLayer(marcadorLoja);
                    // Coordenadas de exemplo (São Paulo)
                    marcadorLoja = L.marker([-23.5505, -46.6333], {
                        icon: L.icon({
                            iconUrl: '🏪',
                            iconSize: [40, 40]
                        })
                    }).addTo(mapa).bindPopup('Loja: ' + data.loja);
                }
            });
        });

        // Atualizar localização do usuário (se for o Marcelo)
        if(navigator.geolocation) {
            setInterval(() => {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    setDoc(doc(db, 'localizacao', 'marcelo'), {
                        lat: latitude,
                        lng: longitude,
                        timestamp: Timestamp.now()
                    }, { merge: true });
                });
            }, 5000); // Atualizar a cada 5 segundos
        }
    </script>
</body>
</html>
