<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restaurante - Marcelo Entregas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* LOGIN */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
        .login-box {
            background: #1e293b;
            border: 2px solid #3b82f6;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 { font-size: 28px; margin-bottom: 10px; text-align: center; }
        .login-box p { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: #2563eb; }
        .demo-creds {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
        }
        
        /* DASHBOARD */
        .dashboard { display: none; flex-direction: column; }
        .dashboard.active { display: flex; }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 20px; }
        .header p { font-size: 11px; color: #dbeafe; }
        .btn-logout { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        
        /* CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* MOTOBOYS ONLINE */
        .motoboys-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .motoboys-section h2 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .motoboy-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .motoboy-info { flex: 1; }
        .motoboy-name { font-weight: bold; margin-bottom: 3px; }
        .motoboy-status { font-size: 11px; color: #94a3b8; }
        .status-badge { 
            display: inline-block; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 10px; 
            font-weight: bold;
            margin-right: 8px;
        }
        .status-online { background: #10b981; color: #fff; }
        .status-ocupado { background: #f59e0b; color: #fff; }
        .btn-chamar { 
            background: #3b82f6; 
            color: #fff; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 12px;
        }
        .btn-chamar:hover { background: #2563eb; }
        .btn-chamar:disabled { background: #64748b; cursor: not-allowed; }
        
        /* ENTREGAS FORM */
        .entregas-form {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .entregas-form.active { display: block; }
        .entregas-form h2 { font-size: 16px; margin-bottom: 12px; }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 10px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 6px; 
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-add { 
            background: #10b981; 
            color: #fff; 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-add:hover { background: #059669; }
        .btn-cancel { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
        }
        .btn-cancel:hover { background: #b91c1c; }
        
        /* LISTA ENTREGAS */
        .entregas-list {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .entregas-list.active { display: block; }
        .entregas-list h2 { font-size: 16px; margin-bottom: 12px; }
        .entrega-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .entrega-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .entrega-cliente { font-weight: bold; }
        .entrega-valor { font-size: 14px; font-weight: bold; color: #3b82f6; }
        .entrega-details { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .btn-remove { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 6px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px;
        }
        .btn-remove:hover { background: #b91c1c; }
        .btn-finalizar { 
            background: #3b82f6; 
            color: #fff; 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
        }
        .btn-finalizar:hover { background: #2563eb; }
        
        /* ACOMPANHAMENTO */
        .acompanhamento {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .acompanhamento.active { display: block; }
        .acompanhamento h2 { font-size: 16px; margin-bottom: 12px; }
        .status-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .status-icon { font-size: 18px; margin-right: 8px; }
        .status-text { font-weight: bold; }
        .status-endereco { font-size: 12px; color: #94a3b8; }
        
        /* EMPTY STATE */
        .empty-state { text-align: center; color: #64748b; padding: 20px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
        
        /* FOOTER */
        .footer { padding: 15px; background: #0f172a; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🍽️ Restaurante</h1>
        <p>Marcelo Entregas</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
        
        <div class="demo-creds">
            <strong>Teste:</strong><br>
            Email: loja@test.com<br>
            Senha: 123456
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="header">
        <div>
            <h1>🍽️ Restaurante</h1>
            <p id="nomeUsuario">Bem-vindo!</p>
        </div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="content">
        <!-- MOTOBOYS ONLINE -->
        <div class="motoboys-section">
            <h2>🏍️ Motoboys Online</h2>
            <div id="motoboys-list">
                <div class="empty-state">
                    <div class="empty-state-icon">🚫</div>
                    <p>Nenhum motoboy disponível</p>
                </div>
            </div>
        </div>

        <!-- FORM ENTREGAS -->
        <div class="entregas-form" id="entregas-form">
            <h2>📦 Adicionar Entregas</h2>
            
            <div class="form-group">
                <label>Cliente</label>
                <input type="text" id="cliente" placeholder="Nome do cliente">
            </div>
            
            <div class="form-group">
                <label>Endereço</label>
                <input type="text" id="endereco" placeholder="Rua, número, bairro">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="valor" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Pagamento</label>
                    <select id="pagamento">
                        <option value="">Selecione...</option>
                        <option value="pix">Pix</option>
                        <option value="dinheiro">Dinheiro</option>
                        <option value="cartao">Cartão</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Troco (se dinheiro)</label>
                <input type="number" id="troco" placeholder="0.00" step="0.01">
            </div>
            
            <div class="form-group">
                <label>Observações</label>
                <input type="text" id="observacoes" placeholder="Ex: Sem cebola, sem alho...">
            </div>
            
            <button class="btn-add" onclick="adicionarEntrega()">➕ ADICIONAR ENTREGA</button>
            <button class="btn-cancel" onclick="cancelarChamado()">❌ CANCELAR CHAMADO</button>
        </div>

        <!-- LISTA ENTREGAS -->
        <div class="entregas-list" id="entregas-list">
            <h2>📋 Entregas Adicionadas</h2>
            <div id="lista-entregas"></div>
            <button class="btn-finalizar" onclick="finalizarLote()">✓ FINALIZAR LOTE</button>
        </div>

        <!-- ACOMPANHAMENTO -->
        <div class="acompanhamento" id="acompanhamento">
            <h2>🚚 Acompanhamento</h2>
            <div id="acompanhamento-list"></div>
        </div>
    </div>
</div>

<script>
    let usuarioAtual = null;
    let motoboyAtual = null;
    let entregasAdicionadas = [];
    let chamadoAtivo = null;

    // LOGIN
    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            alert('Preencha email e senha!');
            return;
        }

        usuarioAtual = {
            email: email,
            nome: email.split('@')[0],
            id: Math.random().toString(36).substr(2, 9),
            tipo: 'restaurante'
        };

        localStorage.setItem('usuarioRestaurante', JSON.stringify(usuarioAtual));
        mostrarDashboard();
        carregarMotoboys();
    }

    // LOGOUT
    function fazerLogout() {
        if (confirm('Deseja sair?')) {
            usuarioAtual = null;
            localStorage.removeItem('usuarioRestaurante');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    }

    // MOSTRAR DASHBOARD
    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('nomeUsuario').textContent = `Bem-vindo, ${usuarioAtual.nome}!`;
    }

    // CARREGAR MOTOBOYS
    function carregarMotoboys() {
        let motoboys = JSON.parse(localStorage.getItem('motoboys') || '[]');
        
        // Simular motoboys com status
        if (motoboys.length === 0) {
            motoboys = [
                { id: 1, nome: 'Marcelo', status: 'online', telefone: '11999999999' },
                { id: 2, nome: 'João', status: 'offline', telefone: '11988888888' },
                { id: 3, nome: 'Pedro', status: 'atendendo', restaurante: 'Outro lugar' }
            ];
        }

        const lista = document.getElementById('motoboys-list');
        const motoboyOnline = motoboys.filter(m => m.status === 'online');

        if (motoboyOnline.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🚫</div><p>Nenhum motoboy disponível</p></div>';
            return;
        }

        lista.innerHTML = motoboyOnline.map(m => `
            <div class="motoboy-item">
                <div class="motoboy-info">
                    <div class="motoboy-name">${m.nome}</div>
                    <div class="motoboy-status">
                        <span class="status-badge status-online">🟢 Online</span>
                        ${m.telefone}
                    </div>
                </div>
                <button class="btn-chamar" onclick="chamarMotoboy(${m.id}, '${m.nome}')">CHAMAR</button>
            </div>
        `).join('');
    }

    // CHAMAR MOTOBOY
    function chamarMotoboy(id, nome) {
        motoboyAtual = { id, nome };
        chamadoAtivo = {
            id: Math.random().toString(36).substr(2, 9),
            restaurante_id: usuarioAtual.id,
            motoboy_id: id,
            motoboy_nome: nome,
            status: 'aguardando',
            entregas: [],
            data: new Date().toLocaleString('pt-BR')
        };

        entregasAdicionadas = [];
        document.getElementById('motoboys-section').style.display = 'none';
        document.getElementById('entregas-form').classList.add('active');
        document.getElementById('entregas-list').classList.remove('active');
        document.getElementById('acompanhamento').classList.remove('active');
    }

    // ADICIONAR ENTREGA
    function adicionarEntrega() {
        const cliente = document.getElementById('cliente').value;
        const endereco = document.getElementById('endereco').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const pagamento = document.getElementById('pagamento').value;
        const troco = parseFloat(document.getElementById('troco').value) || 0;
        const observacoes = document.getElementById('observacao').value;

        if (!cliente || !endereco || !valor || !pagamento) {
            alert('Preencha todos os campos obrigatórios!');
            return;
        }

        const entrega = {
            id: Math.random().toString(36).substr(2, 9),
            cliente,
            endereco,
            valor,
            pagamento,
            troco,
            observacoes,
            sequencia: entregasAdicionadas.length + 1,
            status: 'aguardando'
        };

        entregasAdicionadas.push(entrega);

        // Limpar formulário
        document.getElementById('cliente').value = '';
        document.getElementById('endereco').value = '';
        document.getElementById('valor').value = '';
        document.getElementById('pagamento').value = '';
        document.getElementById('troco').value = '';
        document.getElementById('observacoes').value = '';

        renderizarEntregas();
    }

    // RENDERIZAR ENTREGAS
    function renderizarEntregas() {
        const lista = document.getElementById('lista-entregas');
        
        if (entregasAdicionadas.length === 0) {
            lista.innerHTML = '<div class="empty-state"><p>Nenhuma entrega adicionada</p></div>';
            document.getElementById('entregas-list').classList.remove('active');
            return;
        }

        document.getElementById('entregas-list').classList.add('active');
        
        lista.innerHTML = entregasAdicionadas.map((e, idx) => `
            <div class="entrega-item">
                <div class="entrega-header">
                    <div>
                        <div class="entrega-cliente">${idx + 1}. ${e.cliente}</div>
                        <div class="entrega-details">${e.endereco}</div>
                    </div>
                    <button class="btn-remove" onclick="removerEntrega(${idx})">🗑️</button>
                </div>
                <div class="entrega-details">
                    Pagamento: ${e.pagamento.toUpperCase()} | Valor: R$ ${e.valor.toFixed(2)}
                    ${e.troco > 0 ? ` | Troco: R$ ${e.troco.toFixed(2)}` : ''}
                </div>
                ${e.observacoes ? `<div class="entrega-details">📝 ${e.observacoes}</div>` : ''}
            </div>
        `).join('');
    }

    // REMOVER ENTREGA
    function removerEntrega(idx) {
        entregasAdicionadas.splice(idx, 1);
        renderizarEntregas();
    }

    // FINALIZAR LOTE
    function finalizarLote() {
        if (entregasAdicionadas.length === 0) {
            alert('Adicione pelo menos uma entrega!');
            return;
        }

        chamadoAtivo.entregas = entregasAdicionadas;
        chamadoAtivo.valor_total = entregasAdicionadas.reduce((sum, e) => sum + e.valor, 0);

        // Salvar chamado
        let chamados = JSON.parse(localStorage.getItem('chamados') || '[]');
        chamados.push(chamadoAtivo);
        localStorage.setItem('chamados', JSON.stringify(chamados));

        alert(`✓ Lote finalizado!\n${entregasAdicionadas.length} entregas enviadas para ${motoboyAtual.nome}`);

        document.getElementById('entregas-form').classList.remove('active');
        document.getElementById('entregas-list').classList.remove('active');
        document.getElementById('acompanhamento').classList.add('active');

        renderizarAcompanhamento();
    }

    // RENDERIZAR ACOMPANHAMENTO
    function renderizarAcompanhamento() {
        const lista = document.getElementById('acompanhamento-list');
        
        lista.innerHTML = chamadoAtivo.entregas.map((e, idx) => `
            <div class="status-item">
                <div style="display: flex; align-items: center; margin-bottom: 8px;">
                    <span class="status-icon">🚚</span>
                    <span class="status-text">${e.sequencia}. ${e.cliente}</span>
                </div>
                <div class="status-endereco">${e.endereco}</div>
                <div class="status-endereco">R$ ${e.valor.toFixed(2)} • ${e.pagamento.toUpperCase()}</div>
            </div>
        `).join('');
    }

    // CANCELAR CHAMADO
    function cancelarChamado() {
        if (confirm('Cancelar chamado?')) {
            entregasAdicionadas = [];
            motoboyAtual = null;
            chamadoAtivo = null;
            document.getElementById('entregas-form').classList.remove('active');
            document.getElementById('motoboys-section').style.display = 'block';
            document.getElementById('cliente').value = '';
            document.getElementById('endereco').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('pagamento').value = '';
            document.getElementById('troco').value = '';
            document.getElementById('observacoes').value = '';
        }
    }

    // VERIFICAR LOGIN
    window.addEventListener('load', function() {
        const usuario = localStorage.getItem('usuarioRestaurante');
        if (usuario) {
            usuarioAtual = JSON.parse(usuario);
            mostrarDashboard();
            carregarMotoboys();
        }
    });

    // ATUALIZAR A CADA 5 SEGUNDOS
    setInterval(function() {
        if (usuarioAtual) {
            carregarMotoboys();
        }
    }, 5000);
</script>

</body>
</html>
