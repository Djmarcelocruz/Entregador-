<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Motoboy - Marcelo Entregas Pro</title>
    <link rel="manifest" href="data:application/manifest+json,{\"name\":\"Marcelo Entregas\",\"short_name\":\"Entregas\",\"start_url\":\"/\",\"display\":\"standalone\",\"background_color\":\"#0f172a\",\"theme_color\":\"#10b981\",\"icons\":[]}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        html, body { height: 100%; width: 100%; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* LOGIN */
        .login-screen { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 15px;
        }
        .login-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #10b981;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-box h1 { font-size: 32px; margin-bottom: 10px; text-align: center; }
        .login-box p { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { 
            width: 100%; 
            padding: 14px; 
            background: #0f172a; 
            border: 2px solid #334155; 
            border-radius: 10px; 
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #10b981; background: #1e293b; }
        .btn-login { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .btn-login:hover { transform: translateY(-2px); }
        .demo-creds {
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid #10b981;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
        }
        
        /* DASHBOARD */
        .dashboard { display: none; flex-direction: column; height: 100vh; }
        .dashboard.active { display: flex; }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .header-left h1 { font-size: 20px; margin-bottom: 2px; }
        .header-left p { font-size: 11px; color: #d1fae5; }
        .btn-logout { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
        }
        .btn-logout:hover { background: #b91c1c; }
        
        /* CONTENT */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* CARD */
        .card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        /* STATUS */
        .status-section { text-align: center; }
        .status-badge { 
            display: inline-block; 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .status-offline { background: #64748b; color: #fff; }
        .status-online { background: #10b981; color: #fff; }
        .status-atendendo { background: #f59e0b; color: #fff; }
        
        .btn-status { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-status:hover { transform: translateY(-2px); }
        .btn-status.offline { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-status.online { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); }
        
        /* CHAMADO */
        .chamado-section {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border: 2px solid #f59e0b;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .chamado-section.active { display: block; }
        .chamado-header { 
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
            color: #fff;
        }
        .chamado-info { margin-bottom: 12px; }
        .chamado-label { font-size: 11px; color: rgba(255,255,255,0.8); }
        .chamado-value { font-size: 16px; font-weight: bold; color: #fff; }
        .btn-aceitar { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            width: 48%;
            margin-right: 4%;
            transition: all 0.3s;
        }
        .btn-recusar { 
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: #fff; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            width: 48%;
            transition: all 0.3s;
        }
        
        /* ENTREGAS */
        .entregas-section {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .entregas-section.active { display: block; }
        .entregas-section h2 { font-size: 16px; margin-bottom: 12px; }
        
        .proxima-entrega {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .proxima-label { font-size: 12px; color: #d1fae5; margin-bottom: 8px; font-weight: bold; }
        .proxima-cliente { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
        .proxima-endereco { font-size: 12px; color: #d1fae5; margin-bottom: 12px; }
        .btn-entregue { 
            background: #fff; 
            color: #10b981; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            font-size: 16px;
        }
        .btn-entregue:hover { background: #d1fae5; }
        
        .outras-entregas { margin-top: 12px; }
        .outra-entrega {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            transition: all 0.3s;
        }
        .outra-entrega:hover { border-color: #10b981; }
        .entrega-seq { 
            display: inline-block; 
            background: #10b981; 
            color: #fff;
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold;
            margin-right: 8px;
        }
        .entrega-cliente { font-weight: bold; margin-bottom: 3px; }
        .entrega-endereco { font-size: 12px; color: #94a3b8; }
        
        /* GANHOS */
        .ganhos-section {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #f59e0b;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .ganhos-section.active { display: block; }
        .ganho-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ganho-label { font-size: 12px; color: #94a3b8; }
        .ganho-valor { font-size: 18px; font-weight: bold; color: #f59e0b; }
        
        /* HISTÓRICO */
        .historico-section {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #3b82f6;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .historico-section.active { display: block; }
        
        .historico-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .historico-info { flex: 1; }
        .historico-cliente { font-weight: bold; margin-bottom: 4px; }
        .historico-endereco { font-size: 12px; color: #94a3b8; }
        .btn-deletar { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 6px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px;
            transition: all 0.3s;
        }
        .btn-deletar:hover { background: #b91c1c; }
        
        /* NOTIFICAÇÃO */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            display: none;
        }
        .notification.show { display: block; }
        @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }
        
        /* EMPTY STATE */
        .empty-state { text-align: center; color: #64748b; padding: 20px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🏍️</h1>
        <h1>Motoboy</h1>
        <p>Marcelo Entregas Pro</p>
        
        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label>🔐 Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
        
        <div class="demo-creds">
            <strong>🧪 Teste:</strong><br>
            marcelo@test.com<br>
            123456
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="header">
        <div class="header-left">
            <h1>🏍️ Motoboy</h1>
            <p id="nomeUsuario">Bem-vindo!</p>
        </div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="content">
        <!-- STATUS -->
        <div class="card status-section">
            <div class="status-badge" id="status-badge">🔴 OFFLINE</div>
            <button class="btn-status offline" id="btn-status" onclick="alternarStatus()">🟢 FICAR ONLINE</button>
        </div>

        <!-- CHAMADO -->
        <div class="card chamado-section" id="chamado-section">
            <div class="chamado-header">🔔 NOVO CHAMADO!</div>
            <div class="chamado-info">
                <div class="chamado-label">Restaurante</div>
                <div class="chamado-value" id="chamado-restaurante">-</div>
            </div>
            <div class="chamado-info">
                <div class="chamado-label">Total de Entregas</div>
                <div class="chamado-value" id="chamado-total">0</div>
            </div>
            <div style="display: flex; gap: 4%; margin-top: 15px;">
                <button class="btn-aceitar" onclick="aceitarChamado()">✓ ACEITAR</button>
                <button class="btn-recusar" onclick="recusarChamado()">❌ RECUSAR</button>
            </div>
        </div>

        <!-- ENTREGAS -->
        <div class="card entregas-section" id="entregas-section">
            <h2>📦 Entregas (<span id="total-entregas">0</span>)</h2>
            
            <div class="proxima-entrega">
                <div class="proxima-label">🎯 PRÓXIMA ENTREGA</div>
                <div class="proxima-cliente" id="proxima-cliente">-</div>
                <div class="proxima-endereco" id="proxima-endereco">-</div>
                <button class="btn-entregue" onclick="marcarEntregue()">✓ ENTREGUE</button>
            </div>

            <div class="outras-entregas" id="outras-entregas"></div>

            <button class="btn-status online" onclick="finalizarAtendimento()" style="margin-top: 12px;">🔴 FICAR OFFLINE</button>
        </div>

        <!-- GANHOS -->
        <div class="card ganhos-section" id="ganhos-section">
            <h2>💰 Ganhos do Dia</h2>
            <div class="ganho-item">
                <div class="ganho-label">Entregas Realizadas</div>
                <div class="ganho-valor" id="ganho-entregas">0</div>
            </div>
            <div class="ganho-item">
                <div class="ganho-label">Ganho Total</div>
                <div class="ganho-valor" id="ganho-total">R$ 0,00</div>
            </div>
        </div>

        <!-- HISTÓRICO -->
        <div class="card historico-section" id="historico-section">
            <h2>📜 Histórico do Dia</h2>
            <div id="historico-list"></div>
        </div>
    </div>
</div>

<!-- NOTIFICAÇÃO -->
<div class="notification" id="notification"></div>

<script>
    let usuarioAtual = null;
    let statusAtual = 'offline';
    let chamadoAtual = null;
    let entregasAtendimento = [];
    let historicoEntregas = [];

    function mostrarNotificacao(mensagem) {
        const notif = document.getElementById('notification');
        notif.textContent = mensagem;
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 3000);
    }

    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            mostrarNotificacao('❌ Preencha email e senha!');
            return;
        }

        usuarioAtual = {
            email: email,
            nome: email.split('@')[0],
            id: Math.random().toString(36).substr(2, 9),
            tipo: 'motoboy'
        };

        localStorage.setItem('usuarioMotoboy', JSON.stringify(usuarioAtual));
        mostrarDashboard();
    }

    function fazerLogout() {
        if (confirm('Deseja sair?')) {
            usuarioAtual = null;
            statusAtual = 'offline';
            localStorage.removeItem('usuarioMotoboy');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    }

    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('nomeUsuario').textContent = usuarioAtual.nome.toUpperCase();
    }

    function alternarStatus() {
        if (statusAtual === 'offline') {
            statusAtual = 'online';
            document.getElementById('status-badge').textContent = '🟢 ONLINE';
            document.getElementById('btn-status').textContent = '🔴 FICAR OFFLINE';
            document.getElementById('btn-status').classList.remove('offline');
            document.getElementById('btn-status').classList.add('online');
            mostrarNotificacao('✓ Você está ONLINE!');
            verificarChamados();
        } else if (statusAtual === 'online') {
            statusAtual = 'offline';
            document.getElementById('status-badge').textContent = '🔴 OFFLINE';
            document.getElementById('btn-status').textContent = '🟢 FICAR ONLINE';
            document.getElementById('btn-status').classList.remove('online');
            document.getElementById('btn-status').classList.add('offline');
            document.getElementById('chamado-section').classList.remove('active');
            mostrarNotificacao('❌ Você está OFFLINE');
        }
    }

    function verificarChamados() {
        let chamados = JSON.parse(localStorage.getItem('chamados') || '[]');
        const chamadoPendente = chamados.find(c => c.status === 'aguardando');

        if (chamadoPendente) {
            chamadoAtual = chamadoPendente;
            document.getElementById('chamado-restaurante').textContent = chamadoAtual.motoboy_nome;
            document.getElementById('chamado-total').textContent = chamadoAtual.entregas.length;
            document.getElementById('chamado-section').classList.add('active');
            mostrarNotificacao('🔔 NOVO CHAMADO! Toque para aceitar');
        }
    }

    function aceitarChamado() {
        if (!chamadoAtual) return;

        chamadoAtual.status = 'atendendo';
        statusAtual = 'atendendo';

        entregasAtendimento = JSON.parse(JSON.stringify(chamadoAtual.entregas));
        entregasAtendimento.sort((a, b) => a.sequencia - b.sequencia);

        let chamados = JSON.parse(localStorage.getItem('chamados') || '[]');
        chamados = chamados.map(c => c.id === chamadoAtual.id ? chamadoAtual : c);
        localStorage.setItem('chamados', JSON.stringify(chamados));

        document.getElementById('status-badge').textContent = '🟡 ATENDENDO';
        document.getElementById('chamado-section').classList.remove('active');
        document.getElementById('entregas-section').classList.add('active');
        document.getElementById('ganhos-section').classList.add('active');

        renderizarEntregas();
        mostrarNotificacao(`✓ Chamado aceito! ${entregasAtendimento.length} entregas`);
    }

    function recusarChamado() {
        chamadoAtual = null;
        document.getElementById('chamado-section').classList.remove('active');
        mostrarNotificacao('❌ Chamado recusado');
    }

    function renderizarEntregas() {
        if (entregasAtendimento.length === 0) return;

        const proxima = entregasAtendimento[0];
        document.getElementById('proxima-cliente').textContent = proxima.cliente;
        document.getElementById('proxima-endereco').textContent = `📍 ${proxima.endereco} • 📞 ${proxima.numero}`;
        document.getElementById('total-entregas').textContent = entregasAtendimento.length;

        const outras = entregasAtendimento.slice(1);
        const outrasHTML = outras.map((e, idx) => `
            <div class="outra-entrega">
                <span class="entrega-seq">${idx + 2}</span>
                <div class="entrega-cliente">${e.cliente}</div>
                <div class="entrega-endereco">📍 ${e.endereco} • 📞 ${e.numero}</div>
            </div>
        `).join('');

        document.getElementById('outras-entregas').innerHTML = outrasHTML;
    }

    function marcarEntregue() {
        if (entregasAtendimento.length === 0) return;

        const entrega = entregasAtendimento.shift();
        entrega.status = 'entregue';
        entrega.hora_entrega = new Date().toLocaleTimeString('pt-BR');

        historicoEntregas.push(entrega);

        if (entregasAtendimento.length === 0) {
            finalizarAtendimento();
        } else {
            renderizarEntregas();
            renderizarGanhos();
            mostrarNotificacao(`✓ Entrega realizada! ${entregasAtendimento.length} restantes`);
        }
    }

    function renderizarGanhos() {
        document.getElementById('ganho-entregas').textContent = historicoEntregas.length;
        const total = historicoEntregas.reduce((sum, e) => sum + (e.valor || 5), 0);
        document.getElementById('ganho-total').textContent = `R$ ${total.toFixed(2)}`;
    }

    function finalizarAtendimento() {
        if (confirm('Finalizar atendimento?')) {
            statusAtual = 'online';
            chamadoAtual = null;
            entregasAtendimento = [];

            document.getElementById('status-badge').textContent = '🟢 ONLINE';
            document.getElementById('entregas-section').classList.remove('active');
            document.getElementById('ganhos-section').classList.remove('active');
            document.getElementById('historico-section').classList.add('active');

            renderizarHistorico();
            mostrarNotificacao('✓ Atendimento finalizado!');
        }
    }

    function renderizarHistorico() {
        const lista = document.getElementById('historico-list');
        
        if (historicoEntregas.length === 0) {
            lista.innerHTML = '<div class="empty-state"><p>Nenhuma entrega realizada</p></div>';
            return;
        }

        lista.innerHTML = historicoEntregas.map((e, idx) => `
            <div class="historico-item">
                <div class="historico-info">
                    <div class="historico-cliente">✓ ${e.cliente}</div>
                    <div class="historico-endereco">📍 ${e.endereco} • ⏰ ${e.hora_entrega}</div>
                </div>
                <button class="btn-deletar" onclick="deletarHistorico(${idx})">🗑️</button>
            </div>
        `).join('');
    }

    function deletarHistorico(idx) {
        historicoEntregas.splice(idx, 1);
        renderizarHistorico();
    }

    window.addEventListener('load', function() {
        const usuario = localStorage.getItem('usuarioMotoboy');
        if (usuario) {
            usuarioAtual = JSON.parse(usuario);
            mostrarDashboard();
        }
    });

    setInterval(function() {
        if (usuarioAtual && statusAtual === 'online' && !chamadoAtual) {
            verificarChamados();
        }
    }, 5000);
</script>

</body>
</html>
