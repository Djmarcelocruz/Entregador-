<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamar Marcelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <div id="setupLoja" class="hidden fixed inset-0 bg-white z-50 p-6 flex flex-col justify-center">
        <h1 class="text-2xl font-black mb-4 text-blue-600">Configurar Loja</h1>
        <div class="space-y-3">
            <input id="nLoja" placeholder="Nome da Loja" class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none">
            <input id="zLoja" placeholder="WhatsApp (1499...)" class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none" type="tel">
            <input id="eLoja" placeholder="Endereço" class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none">
            <button onclick="salvarConfig()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black">SALVAR</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 h-screen flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <span class="text-slate-400 text-[10px] font-bold uppercase italic">Marcelo Entregas</span>
            <button onclick="abrirSetup()" class="text-[10px] font-bold text-slate-400">⚙️ EDITAR</button>
        </div>

        <div id="cardStatus" class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6 text-center">
            <div id="dotStatus" class="w-2 h-2 rounded-full mx-auto mb-1 bg-slate-300"></div>
            <span id="textStatus" class="text-lg font-black italic">CONECTANDO...</span>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center">
            <button id="btnChamar" onclick="chamar()" class="w-52 h-52 rounded-full bg-blue-600 text-white font-black text-2xl shadow-2xl border-[10px] border-white active:scale-95 disabled:opacity-30">CHAMAR MARCELO</button>
            
            <div id="controlesAtivos" class="hidden w-full text-center">
                <div class="bg-white p-8 rounded-[40px] shadow-xl border border-blue-50">
                    <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Entregas Realizadas Hoje</p>
                    <h1 id="posFila" class="text-8xl font-black text-blue-600 my-2">0</h1>
                    <p class="text-slate-400 text-xs font-medium italic">Aguardando novo chamado...</p>
                    <button onclick="chamar()" class="mt-6 bg-blue-100 text-blue-700 px-6 py-3 rounded-2xl font-black text-sm active:scale-95">CHAMAR NOVAMENTE</button>
                </div>
            </div>

            <a id="linkZapMarcelo" href="#" class="mt-12 text-emerald-600 font-bold bg-white px-8 py-3 rounded-2xl shadow-sm border border-emerald-50">💬 Falar com Marcelo</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, Timestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let config = JSON.parse(localStorage.getItem('marcelo_loja_config'));
        if(!config) document.getElementById('setupLoja').classList.remove('hidden');

        window.salvarConfig = () => {
            const nome = document.getElementById('nLoja').value.trim();
            const zap = document.getElementById('zLoja').value.replace(/\D/g,'');
            const end = document.getElementById('eLoja').value.trim();
            if(nome && zap && end) {
                localStorage.setItem('marcelo_loja_config', JSON.stringify({nome, zap, end}));
                location.reload();
            }
        };
        window.abrirSetup = () => document.getElementById('setupLoja').classList.remove('hidden');

        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data() || { label: 'OFFLINE', meuWhatsApp: '' };
            document.getElementById('textStatus').textContent = data.label;
            document.getElementById('btnChamar').disabled = data.label === 'OFFLINE';
            document.getElementById('dotStatus').className = `w-2 h-2 rounded-full mx-auto mb-1 ${data.label==='DISPONÍVEL'?'bg-green-500':'bg-orange-500'}`;
            document.getElementById('linkZapMarcelo').href = `https://wa.me/55${data.meuWhatsApp}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            let dadosMinhaLoja = null;
            let idDoc = null;
            snap.forEach(d => { if(d.data().loja === config?.nome) { dadosMinhaLoja = d.data(); idDoc = d.id; } });

            const areaAtiva = document.getElementById('controlesAtivos');
            const btnChamar = document.getElementById('btnChamar');

            if(dadosMinhaLoja) {
                areaAtiva.classList.remove('hidden');
                btnChamar.classList.add('hidden');
                document.getElementById('posFila').textContent = dadosMinhaLoja.contagem || 0;
            } else {
                areaAtiva.classList.add('hidden');
                btnChamar.classList.remove('hidden');
            }
        });

        window.chamar = async () => {
            // Se já existir a loja na lista, o botão "Chamar Novamente" apenas avisa o Marcelo (reseta o som)
            // Mas no nosso código simplificado, o chamado inicial já mantém a loja aberta.
            let existe = false;
            // (Lógica simplificada: Se não está na tela, cria. Se está, o botão Chamar Novamente pode ser usado para dar um "ping")
            await addDoc(collection(db, 'chamadas'), { 
                loja: config.nome, zap: config.zap, enderecoLoja: config.end, 
                hora: Timestamp.now(), contagem: 0 
            });
        };
    </script>
</body>
</html>
