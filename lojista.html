<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loja - Chamar Marcelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen p-4">

    <div id="setupLoja" class="hidden fixed inset-0 bg-white z-50 p-6 flex flex-col justify-center">
        <h1 class="text-2xl font-black mb-4 text-blue-600">Dados da Loja</h1>
        <input id="nLoja" placeholder="Nome da Loja" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 font-bold">
        <input id="zLoja" placeholder="Seu WhatsApp (Ex: 1499...)" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 font-bold">
        <input id="eLoja" placeholder="Endereço Completo" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 font-bold">
        <button onclick="salvarConfig()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black">ENTRAR</button>
    </div>

    <div class="max-w-md mx-auto">
        <div id="cardStatus" class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6 text-center">
            <div id="dotStatus" class="w-3 h-3 rounded-full mx-auto mb-2 bg-slate-300"></div>
            <span id="textStatus" class="text-xl font-black">CARREGANDO...</span>
        </div>

        <div id="areaAcao" class="flex flex-col items-center justify-center py-10">
            <button id="btnChamar" onclick="chamar()" class="w-48 h-48 rounded-full bg-blue-600 text-white font-black text-2xl shadow-2xl border-8 border-white active:scale-95 disabled:opacity-30 transition-all">CHAMAR</button>
            <div id="controlesAtivos" class="hidden mt-6 w-full space-y-3">
                <div class="bg-blue-100 p-4 rounded-2xl text-center">
                    <p class="text-blue-800 font-black text-lg" id="msgFila">Você está na fila!</p>
                    <p class="text-blue-600 text-3xl font-black" id="posFila">--</p>
                </div>
                <button onclick="editarEnd()" class="w-full text-blue-600 font-bold underline">Corrigir Endereço</button>
                <button onclick="cancelar()" class="w-full text-red-500 text-xs font-bold">CANCELAR CHAMADO</button>
            </div>
            <a href="https://wa.me/5514996919053" class="mt-10 flex items-center gap-2 text-emerald-600 font-bold">
                <span>💬 Falar com Marcelo</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, Timestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let config = JSON.parse(localStorage.getItem('marcelo_loja_config'));
        let meuChamadoId = null;

        if(!config) document.getElementById('setupLoja').classList.remove('hidden');

        window.salvarConfig = () => {
            const nome = document.getElementById('nLoja').value;
            const zap = document.getElementById('zLoja').value;
            const end = document.getElementById('eLoja').value;
            if(nome && zap && end) {
                localStorage.setItem('marcelo_loja_config', JSON.stringify({nome, zap, end}));
                location.reload();
            }
        };

        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data();
            document.getElementById('textStatus').textContent = data.label;
            document.getElementById('btnChamar').disabled = data.label === 'OFFLINE';
            document.getElementById('dotStatus').className = `w-3 h-3 rounded-full mx-auto mb-2 ${data.label==='DISPONÍVEL'?'bg-green-500':'bg-orange-500'}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            let pos = 0; let i = 1; meuChamadoId = null;
            snap.forEach(d => {
                if(d.data().loja === config?.nome) { pos = i; meuChamadoId = d.id; var status = d.data().status; }
                i++;
            });

            const area = document.getElementById('controlesAtivos');
            const btn = document.getElementById('btnChamar');
            if(pos > 0) {
                area.classList.remove('hidden');
                btn.classList.add('hidden');
                document.getElementById('posFila').textContent = status === 'Atendendo' ? '🚀' : pos + 'º';
                document.getElementById('msgFila').textContent = status === 'Atendendo' ? 'Marcelo em Atendimento!' : 'Você está na fila!';
            } else {
                area.classList.add('hidden');
                btn.classList.remove('hidden');
            }
        });

        window.chamar = () => addDoc(collection(db, 'chamadas'), { loja: config.nome, zap: config.zap, enderecoLoja: config.end, hora: Timestamp.now(), status: 'Pendente' });
        window.cancelar = () => confirm("Deseja cancelar o chamado?") && deleteDoc(doc(db, 'chamadas', meuChamadoId));
        window.editarEnd = () => {
            const novo = prompt("Novo endereço:", config.end);
            if(novo) updateDoc(doc(db, 'chamadas', meuChamadoId), { enderecoLoja: novo });
        };
    </script>
</body>
</html>
