<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chamar Marcelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <div id="setupLoja" class="hidden fixed inset-0 bg-white z-50 p-6 flex flex-col justify-center">
        <h1 class="text-2xl font-black mb-4 text-blue-600">Dados da Loja</h1>
        <div class="space-y-4">
            <input id="nLoja" placeholder="Nome da Loja" class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500">
            <input id="zLoja" placeholder="Seu WhatsApp (Ex: 1499...)" class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500" type="tel">
            <input id="eLoja" placeholder="Endereço Completo" class="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-blue-500">
            <button onclick="salvarConfig()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg">SALVAR E CONTINUAR</button>
            <button onclick="fecharSetup()" id="btnFecharSetup" class="hidden w-full text-slate-400 font-bold p-2 text-sm">Cancelar</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 h-screen flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Marcelo Entregas</h2>
            <button onclick="abrirSetup()" class="bg-slate-200 px-3 py-1 rounded-full text-[10px] font-bold text-slate-600 uppercase tracking-tighter">⚙️ Editar Loja</button>
        </div>

        <div id="cardStatus" class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-6 text-center">
            <div id="dotStatus" class="w-3 h-3 rounded-full mx-auto mb-2 bg-slate-300"></div>
            <span id="textStatus" class="text-xl font-black italic">CONECTANDO...</span>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center">
            <button id="btnChamar" onclick="chamar()" class="w-48 h-48 rounded-full bg-blue-600 text-white font-black text-2xl shadow-2xl border-8 border-white active:scale-95 disabled:opacity-30 transition-all">CHAMAR</button>
            
            <div id="controlesAtivos" class="hidden mt-6 w-full space-y-4">
                <div class="bg-blue-100 p-6 rounded-3xl text-center border-2 border-blue-200">
                    <p class="text-blue-800 font-black text-lg" id="msgFila">Fila</p>
                    <p class="text-blue-600 text-5xl font-black" id="posFila">--</p>
                </div>
                <div class="flex flex-col gap-3 text-center">
                    <button onclick="cancelar()" class="text-red-500 text-xs font-bold uppercase">Cancelar Chamado</button>
                </div>
            </div>

            <a id="linkZapMarcelo" href="#" class="mt-10 flex items-center gap-2 text-emerald-600 font-bold bg-emerald-50 px-6 py-3 rounded-2xl active:scale-95 transition-all">
                <span>💬 Falar com Marcelo</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, Timestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let config = JSON.parse(localStorage.getItem('marcelo_loja_config'));
        let meuChamadoId = null;

        if(!config) abrirSetup();

        window.abrirSetup = () => {
            if(config) {
                document.getElementById('nLoja').value = config.nome;
                document.getElementById('zLoja').value = config.zap;
                document.getElementById('eLoja').value = config.end;
                document.getElementById('btnFecharSetup').classList.remove('hidden');
            }
            document.getElementById('setupLoja').classList.remove('hidden');
        };

        window.fecharSetup = () => document.getElementById('setupLoja').classList.add('hidden');

        window.salvarConfig = () => {
            const nome = document.getElementById('nLoja').value.trim();
            const zap = document.getElementById('zLoja').value.replace(/\D/g,'');
            const end = document.getElementById('eLoja').value.trim();
            if(nome && zap && end) {
                localStorage.setItem('marcelo_loja_config', JSON.stringify({nome, zap, end}));
                location.reload();
            } else { alert("Preencha tudo!"); }
        };

        onSnapshot(doc(db, 'config', 'status'), (s) => {
            const data = s.data() || { label: 'OFFLINE', meuWhatsApp: '' };
            document.getElementById('textStatus').textContent = data.label;
            document.getElementById('btnChamar').disabled = data.label === 'OFFLINE';
            document.getElementById('dotStatus').className = `w-3 h-3 rounded-full mx-auto mb-2 ${data.label==='DISPONÍVEL'?'bg-green-500':'bg-orange-500'}`;
            document.getElementById('linkZapMarcelo').href = `https://wa.me/55${data.meuWhatsApp}`;
        });

        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'asc')), (snap) => {
            let pos = 0; let i = 1; meuChamadoId = null; let status = 'Pendente';
            snap.forEach(d => {
                if(d.data().loja === config?.nome) { pos = i; meuChamadoId = d.id; status = d.data().status; }
                i++;
            });

            const area = document.getElementById('controlesAtivos');
            const btn = document.getElementById('btnChamar');
            if(pos > 0) {
                area.classList.remove('hidden');
                btn.classList.add('hidden');
                document.getElementById('posFila').textContent = status === 'Atendendo' ? '🚀' : pos + 'º';
                document.getElementById('msgFila').textContent = status === 'Atendendo' ? 'A caminho!' : 'Na Fila';
            } else {
                area.classList.add('hidden');
                btn.classList.remove('hidden');
            }
        });

        window.chamar = async () => {
            if(!config) return abrirSetup();
            try {
                await addDoc(collection(db, 'chamadas'), { 
                    loja: config.nome, 
                    zap: config.zap, 
                    enderecoLoja: config.end, 
                    hora: Timestamp.now(), 
                    status: 'Pendente' 
                });
            } catch (e) { alert("Erro ao chamar!"); }
        };

        window.cancelar = () => confirm("Cancelar chamado?") && deleteDoc(doc(db, 'chamadas', meuChamadoId));
    </script>
</body>
</html>
