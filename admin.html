<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Marcelo Entregas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* Login */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box {
            background: #1e293b;
            border: 2px solid #f59e0b;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 { font-size: 28px; margin-bottom: 10px; text-align: center; }
        .login-box p { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus { outline: none; border-color: #f59e0b; }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #f59e0b; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: #d97706; }
        .demo-creds {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
        }
        
        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            padding: 20px 15px;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 22px; }
        .header p { font-size: 12px; color: #fef3c7; }
        .btn-logout { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .card-icon { font-size: 28px; margin-bottom: 5px; }
        .card-label { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
        .card-value { font-size: 24px; font-weight: bold; }
        
        /* Sections */
        .section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .section h2 { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* List Items */
        .list-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .list-item-title { font-weight: bold; margin-bottom: 3px; }
        .list-item-subtitle { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .list-item-actions { display: flex; gap: 5px; }
        
        /* Buttons */
        .btn {
            background: #f59e0b;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn:hover { background: #d97706; }
        .btn-small { padding: 6px 10px; font-size: 12px; }
        .btn-delete { background: #dc2626; }
        .btn-delete:hover { background: #b91c1c; }
        
        /* Forms */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 4px; }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Empty State */
        .empty-state { text-align: center; color: #64748b; padding: 20px 15px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .tab-btn.active { background: #f59e0b; color: #fff; border-color: #f59e0b; }
        
        /* Copy Button */
        .copy-btn { 
            background: #10b981; 
            padding: 4px 8px; 
            font-size: 11px;
            margin-left: 5px;
        }
        .copy-btn:hover { background: #059669; }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🔐 Admin</h1>
        <p>Marcelo Entregas</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@marceloentregas.com">
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
        
        <div class="demo-creds">
            <strong>Teste:</strong><br>
            Email: admin@test.com<br>
            Senha: 123456
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <!-- Header -->
    <div class="header">
        <div>
            <h1>🔐 Admin</h1>
            <p id="nomeUsuario">Bem-vindo!</p>
        </div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="container">
        <!-- Stats Cards -->
        <div class="cards-grid">
            <div class="card">
                <div class="card-icon">🍽️</div>
                <div class="card-label">Restaurantes</div>
                <div class="card-value" id="totalRestaurantes">0</div>
            </div>
            <div class="card">
                <div class="card-icon">🏍️</div>
                <div class="card-label">Motoboys</div>
                <div class="card-value" id="totalMotoboys">0</div>
            </div>
            <div class="card">
                <div class="card-icon">📦</div>
                <div class="card-label">Entregas</div>
                <div class="card-value" id="totalEntregas">0</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="mostrarAba('restaurantes')">🍽️ Restaurantes</button>
            <button class="tab-btn" onclick="mostrarAba('motoboys')">🏍️ Motoboys</button>
        </div>

        <!-- Restaurantes -->
        <div id="abaRestaurantes" class="section">
            <h2>🍽️ Gerenciar Restaurantes</h2>
            
            <div style="margin-bottom: 15px;">
                <div class="form-group">
                    <label>Nome do Restaurante</label>
                    <input type="text" id="nomeRestaurante" placeholder="Ex: Pizzaria do Pedro">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="emailRestaurante" placeholder="restaurante@email.com">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="telefoneRestaurante" placeholder="11999999999">
                </div>
                <button class="btn" style="width: 100%;" onclick="adicionarRestaurante()">➕ Adicionar Restaurante</button>
            </div>

            <div id="listaRestaurantes">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Nenhum restaurante cadastrado</p>
                </div>
            </div>
        </div>

        <!-- Motoboys -->
        <div id="abaMotoboys" class="section" style="display: none;">
            <h2>🏍️ Gerenciar Motoboys</h2>
            
            <div style="margin-bottom: 15px;">
                <div class="form-group">
                    <label>Nome do Motoboy</label>
                    <input type="text" id="nomeMotoboy" placeholder="Ex: Marcelo">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="emailMotoboy" placeholder="motoboy@email.com">
                </div>
                <div class="form-group">
                    <label>Telefone/WhatsApp</label>
                    <input type="tel" id="telefoneMotoboy" placeholder="11999999999">
                </div>
                <button class="btn" style="width: 100%;" onclick="adicionarMotoboy()">➕ Adicionar Motoboy</button>
            </div>

            <div id="listaMotoboys">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Nenhum motoboy cadastrado</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let usuarioAtual = null;

    // Fazer Login
    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            alert('Preencha email e senha!');
            return;
        }

        usuarioAtual = {
            email: email,
            nome: 'Admin',
            id: Math.random().toString(36).substr(2, 9)
        };

        localStorage.setItem('usuarioAdmin', JSON.stringify(usuarioAtual));
        mostrarDashboard();
        carregarDados();
    }

    // Fazer Logout
    function fazerLogout() {
        if (confirm('Deseja sair?')) {
            usuarioAtual = null;
            localStorage.removeItem('usuarioAdmin');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    }

    // Mostrar Dashboard
    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('nomeUsuario').textContent = `Bem-vindo, ${usuarioAtual.nome}!`;
    }

    // Mostrar Aba
    function mostrarAba(aba) {
        document.querySelectorAll('[id^="aba"]').forEach(el => el.style.display = 'none');
        document.getElementById('aba' + aba.charAt(0).toUpperCase() + aba.slice(1)).style.display = 'block';
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    // Adicionar Restaurante
    function adicionarRestaurante() {
        const nome = document.getElementById('nomeRestaurante').value;
        const email = document.getElementById('emailRestaurante').value;
        const telefone = document.getElementById('telefoneRestaurante').value;

        if (!nome || !email) {
            alert('Preencha nome e email!');
            return;
        }

        const restaurante = {
            id: Math.random().toString(36).substr(2, 9),
            nome: nome,
            email: email,
            telefone: telefone,
            linkAcesso: `${window.location.origin}/restaurante.html?id=${Math.random().toString(36).substr(2, 9)}`
        };

        let restaurantes = JSON.parse(localStorage.getItem('restaurantes') || '[]');
        restaurantes.push(restaurante);
        localStorage.setItem('restaurantes', JSON.stringify(restaurantes));

        alert(`✓ Restaurante adicionado!\nLink de acesso: ${restaurante.linkAcesso}`);

        document.getElementById('nomeRestaurante').value = '';
        document.getElementById('emailRestaurante').value = '';
        document.getElementById('telefoneRestaurante').value = '';

        carregarDados();
    }

    // Adicionar Motoboy
    function adicionarMotoboy() {
        const nome = document.getElementById('nomeMotoboy').value;
        const email = document.getElementById('emailMotoboy').value;
        const telefone = document.getElementById('telefoneMotoboy').value;

        if (!nome || !email) {
            alert('Preencha nome e email!');
            return;
        }

        const motoboy = {
            id: Math.random().toString(36).substr(2, 9),
            nome: nome,
            email: email,
            telefone: telefone,
            linkAcesso: `${window.location.origin}/motoboy.html?id=${Math.random().toString(36).substr(2, 9)}`
        };

        let motoboys = JSON.parse(localStorage.getItem('motoboys') || '[]');
        motoboys.push(motoboy);
        localStorage.setItem('motoboys', JSON.stringify(motoboys));

        alert(`✓ Motoboy adicionado!\nLink de acesso: ${motoboy.linkAcesso}`);

        document.getElementById('nomeMotoboy').value = '';
        document.getElementById('emailMotoboy').value = '';
        document.getElementById('telefoneMotoboy').value = '';

        carregarDados();
    }

    // Deletar Restaurante
    function deletarRestaurante(id) {
        if (confirm('Tem certeza?')) {
            let restaurantes = JSON.parse(localStorage.getItem('restaurantes') || '[]');
            restaurantes = restaurantes.filter(r => r.id !== id);
            localStorage.setItem('restaurantes', JSON.stringify(restaurantes));
            carregarDados();
        }
    }

    // Deletar Motoboy
    function deletarMotoboy(id) {
        if (confirm('Tem certeza?')) {
            let motoboys = JSON.parse(localStorage.getItem('motoboys') || '[]');
            motoboys = motoboys.filter(m => m.id !== id);
            localStorage.setItem('motoboys', JSON.stringify(motoboys));
            carregarDados();
        }
    }

    // Copiar Link
    function copiarLink(link) {
        navigator.clipboard.writeText(link);
        alert('✓ Link copiado para a área de transferência!');
    }

    // Carregar Dados
    function carregarDados() {
        const restaurantes = JSON.parse(localStorage.getItem('restaurantes') || '[]');
        const motoboys = JSON.parse(localStorage.getItem('motoboys') || '[]');

        renderizarRestaurantes(restaurantes);
        renderizarMotoboys(motoboys);
        atualizarEstatisticas(restaurantes, motoboys);
    }

    // Renderizar Restaurantes
    function renderizarRestaurantes(restaurantes) {
        const lista = document.getElementById('listaRestaurantes');
        if (restaurantes.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum restaurante cadastrado</p></div>';
            return;
        }

        lista.innerHTML = restaurantes.map(r => `
            <div class="list-item">
                <div class="list-item-title">${r.nome}</div>
                <div class="list-item-subtitle">${r.email} • ${r.telefone}</div>
                <div class="list-item-subtitle" style="font-size: 11px; word-break: break-all;">Link: ${r.linkAcesso}</div>
                <div class="list-item-actions">
                    <button class="btn btn-small copy-btn" onclick="copiarLink('${r.linkAcesso}')">📋 Copiar</button>
                    <button class="btn btn-small btn-delete" onclick="deletarRestaurante('${r.id}')">🗑️ Deletar</button>
                </div>
            </div>
        `).join('');
    }

    // Renderizar Motoboys
    function renderizarMotoboys(motoboys) {
        const lista = document.getElementById('listaMotoboys');
        if (motoboys.length === 0) {
            lista.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum motoboy cadastrado</p></div>';
            return;
        }

        lista.innerHTML = motoboys.map(m => `
            <div class="list-item">
                <div class="list-item-title">${m.nome}</div>
                <div class="list-item-subtitle">${m.email} • ${m.telefone}</div>
                <div class="list-item-subtitle" style="font-size: 11px; word-break: break-all;">Link: ${m.linkAcesso}</div>
                <div class="list-item-actions">
                    <button class="btn btn-small copy-btn" onclick="copiarLink('${m.linkAcesso}')">📋 Copiar</button>
                    <button class="btn btn-small btn-delete" onclick="deletarMotoboy('${m.id}')">🗑️ Deletar</button>
                </div>
            </div>
        `).join('');
    }

    // Atualizar Estatísticas
    function atualizarEstatisticas(restaurantes, motoboys) {
        document.getElementById('totalRestaurantes').textContent = restaurantes.length;
        document.getElementById('totalMotoboys').textContent = motoboys.length;
        document.getElementById('totalEntregas').textContent = '0';
    }

    // Verificar login ao carregar
    window.addEventListener('load', function() {
        const usuario = localStorage.getItem('usuarioAdmin');
        if (usuario) {
            usuarioAtual = JSON.parse(usuario);
            mostrarDashboard();
            carregarDados();
        }
    });
</script>

</body>
</html>
