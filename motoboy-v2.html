<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motoboy - Marcelo Entregas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* LOGIN */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
        .login-box {
            background: #1e293b;
            border: 2px solid #10b981;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h1 { font-size: 28px; margin-bottom: 10px; text-align: center; }
        .login-box p { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus { outline: none; border-color: #10b981; }
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #10b981; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: #059669; }
        .demo-creds {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
        }
        
        /* DASHBOARD */
        .dashboard { display: none; flex-direction: column; }
        .dashboard.active { display: flex; }
        
        /* HEADER */
        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 20px; }
        .header p { font-size: 11px; color: #d1fae5; }
        .btn-logout { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        
        /* CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* STATUS */
        .status-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .status-badge { 
            display: inline-block; 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .status-offline { background: #64748b; color: #fff; }
        .status-online { background: #10b981; color: #fff; }
        .status-atendendo { background: #f59e0b; color: #fff; }
        
        /* BOTÕES STATUS */
        .btn-status { 
            background: #10b981; 
            color: #fff; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-status:hover { background: #059669; }
        .btn-status.offline { background: #10b981; }
        .btn-status.online { background: #dc2626; }
        
        /* CHAMADO */
        .chamado-section {
            background: #1e293b;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .chamado-section.active { display: block; }
        .chamado-header { 
            background: #f59e0b; 
            color: #fff; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 12px;
            text-align: center;
            font-weight: bold;
        }
        .chamado-info { margin-bottom: 12px; }
        .chamado-info-label { font-size: 11px; color: #94a3b8; }
        .chamado-info-value { font-size: 16px; font-weight: bold; }
        .btn-aceitar { 
            background: #10b981; 
            color: #fff; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            width: 48%;
            margin-right: 4%;
        }
        .btn-recusar { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            width: 48%;
        }
        
        /* ENTREGAS */
        .entregas-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .entregas-section.active { display: block; }
        .entregas-section h2 { font-size: 16px; margin-bottom: 12px; }
        
        .proxima-entrega {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .proxima-label { font-size: 12px; color: #d1fae5; margin-bottom: 8px; }
        .proxima-cliente { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .proxima-endereco { font-size: 12px; color: #d1fae5; margin-bottom: 8px; }
        .btn-entregue { 
            background: #fff; 
            color: #10b981; 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
        }
        .btn-entregue:hover { background: #d1fae5; }
        
        .outras-entregas { margin-top: 12px; }
        .outra-entrega {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .entrega-seq { 
            display: inline-block; 
            background: #334155; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold;
            margin-right: 8px;
        }
        .entrega-cliente { font-weight: bold; }
        .entrega-endereco { font-size: 12px; color: #94a3b8; }
        
        /* HISTÓRICO */
        .historico-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }
        .historico-section.active { display: block; }
        .historico-section h2 { font-size: 16px; margin-bottom: 12px; }
        
        .historico-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .historico-info { flex: 1; }
        .historico-cliente { font-weight: bold; margin-bottom: 4px; }
        .historico-endereco { font-size: 12px; color: #94a3b8; }
        .btn-deletar { 
            background: #dc2626; 
            color: #fff; 
            border: none; 
            padding: 6px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px;
        }
        
        /* EMPTY STATE */
        .empty-state { text-align: center; color: #64748b; padding: 20px; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
        
        /* FOOTER */
        .footer { padding: 15px; background: #0f172a; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>🏍️ Motoboy</h1>
        <p>Marcelo Entregas</p>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR</button>
        
        <div class="demo-creds">
            <strong>Teste:</strong><br>
            Email: marcelo@test.com<br>
            Senha: 123456
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="header">
        <div>
            <h1>🏍️ Motoboy</h1>
            <p id="nomeUsuario">Bem-vindo!</p>
        </div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="content">
        <!-- STATUS -->
        <div class="status-section">
            <div class="status-badge" id="status-badge">🔴 OFFLINE</div>
            <button class="btn-status offline" id="btn-status" onclick="alternarStatus()">🟢 FICAR ONLINE</button>
        </div>

        <!-- CHAMADO -->
        <div class="chamado-section" id="chamado-section">
            <div class="chamado-header">🔔 NOVO CHAMADO!</div>
            <div class="chamado-info">
                <div class="chamado-info-label">Restaurante</div>
                <div class="chamado-info-value" id="chamado-restaurante">-</div>
            </div>
            <div class="chamado-info">
                <div class="chamado-info-label">Total de Entregas</div>
                <div class="chamado-info-value" id="chamado-total">0</div>
            </div>
            <div class="chamado-info">
                <div class="chamado-info-label">Valor Total</div>
                <div class="chamado-info-value" id="chamado-valor">R$ 0,00</div>
            </div>
            <div style="display: flex; gap: 4%; margin-top: 12px;">
                <button class="btn-aceitar" onclick="aceitarChamado()">✓ ACEITAR</button>
                <button class="btn-recusar" onclick="recusarChamado()">❌ RECUSAR</button>
            </div>
        </div>

        <!-- ENTREGAS -->
        <div class="entregas-section" id="entregas-section">
            <h2>📦 Entregas</h2>
            
            <div class="proxima-entrega">
                <div class="proxima-label">PRÓXIMA ENTREGA</div>
                <div class="proxima-cliente" id="proxima-cliente">-</div>
                <div class="proxima-endereco" id="proxima-endereco">-</div>
                <button class="btn-entregue" onclick="marcarEntregue()">✓ ENTREGUE</button>
            </div>

            <div class="outras-entregas" id="outras-entregas"></div>

            <button class="btn-status online" onclick="finalizarAtendimento()" style="margin-top: 12px;">🔴 FICAR OFFLINE</button>
        </div>

        <!-- HISTÓRICO -->
        <div class="historico-section" id="historico-section">
            <h2>📜 Histórico do Dia</h2>
            <div id="historico-list"></div>
        </div>
    </div>
</div>

<script>
    let usuarioAtual = null;
    let statusAtual = 'offline';
    let chamadoAtual = null;
    let entregasAtendimento = [];
    let historicoEntregas = [];

    // LOGIN
    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            alert('Preencha email e senha!');
            return;
        }

        usuarioAtual = {
            email: email,
            nome: email.split('@')[0],
            id: Math.random().toString(36).substr(2, 9),
            tipo: 'motoboy'
        };

        localStorage.setItem('usuarioMotoboy', JSON.stringify(usuarioAtual));
        mostrarDashboard();
    }

    // LOGOUT
    function fazerLogout() {
        if (confirm('Deseja sair?')) {
            usuarioAtual = null;
            statusAtual = 'offline';
            localStorage.removeItem('usuarioMotoboy');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginSenha').value = '';
        }
    }

    // MOSTRAR DASHBOARD
    function mostrarDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        document.getElementById('nomeUsuario').textContent = `Bem-vindo, ${usuarioAtual.nome}!`;
    }

    // ALTERNAR STATUS
    function alternarStatus() {
        if (statusAtual === 'offline') {
            statusAtual = 'online';
            document.getElementById('status-badge').textContent = '🟢 ONLINE';
            document.getElementById('btn-status').textContent = '🔴 FICAR OFFLINE';
            document.getElementById('btn-status').classList.remove('offline');
            document.getElementById('btn-status').classList.add('online');
            verificarChamados();
        } else if (statusAtual === 'online') {
            statusAtual = 'offline';
            document.getElementById('status-badge').textContent = '🔴 OFFLINE';
            document.getElementById('btn-status').textContent = '🟢 FICAR ONLINE';
            document.getElementById('btn-status').classList.remove('online');
            document.getElementById('btn-status').classList.add('offline');
            document.getElementById('chamado-section').classList.remove('active');
        }
    }

    // VERIFICAR CHAMADOS
    function verificarChamados() {
        let chamados = JSON.parse(localStorage.getItem('chamados') || '[]');
        const chamadoPendente = chamados.find(c => c.status === 'aguardando');

        if (chamadoPendente) {
            chamadoAtual = chamadoPendente;
            document.getElementById('chamado-restaurante').textContent = chamadoAtual.motoboy_nome;
            document.getElementById('chamado-total').textContent = chamadoAtual.entregas.length;
            document.getElementById('chamado-valor').textContent = 'R$ ' + chamadoAtual.entregas.reduce((sum, e) => sum + e.valor, 0).toFixed(2);
            document.getElementById('chamado-section').classList.add('active');
        }
    }

    // ACEITAR CHAMADO
    function aceitarChamado() {
        if (!chamadoAtual) return;

        chamadoAtual.status = 'atendendo';
        statusAtual = 'atendendo';

        entregasAtendimento = JSON.parse(JSON.stringify(chamadoAtual.entregas));
        entregasAtendimento.sort((a, b) => a.sequencia - b.sequencia);

        // Salvar chamado atualizado
        let chamados = JSON.parse(localStorage.getItem('chamados') || '[]');
        chamados = chamados.map(c => c.id === chamadoAtual.id ? chamadoAtual : c);
        localStorage.setItem('chamados', JSON.stringify(chamados));

        document.getElementById('status-badge').textContent = '🟡 ATENDENDO';
        document.getElementById('chamado-section').classList.remove('active');
        document.getElementById('entregas-section').classList.add('active');

        renderizarEntregas();
    }

    // RECUSAR CHAMADO
    function recusarChamado() {
        chamadoAtual = null;
        document.getElementById('chamado-section').classList.remove('active');
        alert('Chamado recusado');
    }

    // RENDERIZAR ENTREGAS
    function renderizarEntregas() {
        if (entregasAtendimento.length === 0) return;

        const proxima = entregasAtendimento[0];
        document.getElementById('proxima-cliente').textContent = proxima.cliente;
        document.getElementById('proxima-endereco').textContent = proxima.endereco + ' • R$ ' + proxima.valor.toFixed(2);

        const outras = entregasAtendimento.slice(1);
        const outrasHTML = outras.map((e, idx) => `
            <div class="outra-entrega">
                <span class="entrega-seq">${idx + 2}</span>
                <div class="entrega-cliente">${e.cliente}</div>
                <div class="entrega-endereco">${e.endereco} • R$ ${e.valor.toFixed(2)}</div>
            </div>
        `).join('');

        document.getElementById('outras-entregas').innerHTML = outrasHTML;
    }

    // MARCAR ENTREGUE
    function marcarEntregue() {
        if (entregasAtendimento.length === 0) return;

        const entrega = entregasAtendimento.shift();
        entrega.status = 'entregue';
        entrega.hora_entrega = new Date().toLocaleString('pt-BR');

        historicoEntregas.push(entrega);

        if (entregasAtendimento.length === 0) {
            finalizarAtendimento();
        } else {
            renderizarEntregas();
        }
    }

    // FINALIZAR ATENDIMENTO
    function finalizarAtendimento() {
        if (confirm('Finalizar atendimento?')) {
            statusAtual = 'online';
            chamadoAtual = null;
            entregasAtendimento = [];

            document.getElementById('status-badge').textContent = '🟢 ONLINE';
            document.getElementById('entregas-section').classList.remove('active');
            document.getElementById('historico-section').classList.add('active');

            renderizarHistorico();
        }
    }

    // RENDERIZAR HISTÓRICO
    function renderizarHistorico() {
        const lista = document.getElementById('historico-list');
        
        if (historicoEntregas.length === 0) {
            lista.innerHTML = '<div class="empty-state"><p>Nenhuma entrega realizada</p></div>';
            return;
        }

        lista.innerHTML = historicoEntregas.map((e, idx) => `
            <div class="historico-item">
                <div class="historico-info">
                    <div class="historico-cliente">${idx + 1}. ${e.cliente}</div>
                    <div class="historico-endereco">${e.endereco} • R$ ${e.valor.toFixed(2)}</div>
                    <div class="historico-endereco">✓ ${e.hora_entrega}</div>
                </div>
                <button class="btn-deletar" onclick="deletarHistorico(${idx})">🗑️</button>
            </div>
        `).join('');
    }

    // DELETAR HISTÓRICO
    function deletarHistorico(idx) {
        historicoEntregas.splice(idx, 1);
        renderizarHistorico();
    }

    // VERIFICAR LOGIN
    window.addEventListener('load', function() {
        const usuario = localStorage.getItem('usuarioMotoboy');
        if (usuario) {
            usuarioAtual = JSON.parse(usuario);
            mostrarDashboard();
        }
    });

    // VERIFICAR CHAMADOS A CADA 5 SEGUNDOS
    setInterval(function() {
        if (usuarioAtual && statusAtual === 'online' && !chamadoAtual) {
            verificarChamados();
        }
    }, 5000);
</script>

</body>
</html>
