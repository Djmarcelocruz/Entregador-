<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pagamentos - Marcelo Entregas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white font-sans min-h-screen pb-10">

    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-3xl font-black mb-2 mt-6">💰 Pagamentos</h1>
        <p class="text-slate-400 mb-8">Gerenciar valores e pagamentos automáticos</p>

        <!-- Configuração de Valores -->
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6 mb-8">
            <h2 class="text-2xl font-black mb-6">⚙️ Configurar Valores</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 block mb-2">Valor por Entrega</label>
                    <input type="number" id="valorEntrega" placeholder="5.00" step="0.01" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 block mb-2">Comissão (%)</label>
                    <input type="number" id="comissao" placeholder="10" step="0.1" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 block mb-2">Bônus Diário</label>
                    <input type="number" id="bonusDiario" placeholder="50.00" step="0.01" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-green-500 focus:outline-none">
                </div>
            </div>
            <button onclick="salvarConfiguracao()" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl font-black transition-all">
                ✅ SALVAR CONFIGURAÇÃO
            </button>
        </div>

        <!-- Resumo de Pagamentos -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gradient-to-br from-green-600 to-green-700 rounded-2xl p-6">
                <p class="text-green-100 text-sm font-bold uppercase mb-2">Total Pago Hoje</p>
                <p id="totalPagoHoje" class="text-4xl font-black">R$ 0,00</p>
            </div>
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl p-6">
                <p class="text-blue-100 text-sm font-bold uppercase mb-2">Total Pago Este Mês</p>
                <p id="totalPagoMes" class="text-4xl font-black">R$ 0,00</p>
            </div>
            <div class="bg-gradient-to-br from-purple-600 to-purple-700 rounded-2xl p-6">
                <p class="text-purple-100 text-sm font-bold uppercase mb-2">Pendente</p>
                <p id="totalPendente" class="text-4xl font-black">R$ 0,00</p>
            </div>
        </div>

        <!-- Histórico de Pagamentos -->
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6 mb-8">
            <h2 class="text-2xl font-black mb-6">📋 Histórico de Pagamentos</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-slate-700">
                            <th class="text-left p-3 font-bold text-slate-300">Motoboy</th>
                            <th class="text-left p-3 font-bold text-slate-300">Data</th>
                            <th class="text-left p-3 font-bold text-slate-300">Entregas</th>
                            <th class="text-left p-3 font-bold text-slate-300">Valor</th>
                            <th class="text-left p-3 font-bold text-slate-300">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPagamentos">
                        <tr>
                            <td colspan="5" class="text-center p-4 text-slate-400">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Registrar Pagamento Manual -->
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6">
            <h2 class="text-2xl font-black mb-4">➕ Registrar Pagamento Manual</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 block mb-2">Motoboy</label>
                    <input type="text" id="motoboyPagamento" placeholder="Nome do motoboy" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400 block mb-2">Valor (R$)</label>
                    <input type="number" id="valorPagamento" placeholder="0.00" step="0.01" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none">
                </div>
            </div>
            <button onclick="registrarPagamento()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-black transition-all">
                ✅ REGISTRAR PAGAMENTO
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.salvarConfiguracao = () => {
            const valor = document.getElementById('valorEntrega').value;
            const comissao = document.getElementById('comissao').value;
            const bonus = document.getElementById('bonusDiario').value;

            if(valor && comissao && bonus) {
                localStorage.setItem('config_pagamento', JSON.stringify({
                    valorEntrega: parseFloat(valor),
                    comissao: parseFloat(comissao),
                    bonusDiario: parseFloat(bonus)
                }));
                alert('Configuração salva com sucesso!');
            }
        };

        window.registrarPagamento = async () => {
            const motoboy = document.getElementById('motoboyPagamento').value;
            const valor = parseFloat(document.getElementById('valorPagamento').value);

            if(!motoboy || !valor) {
                alert('Preencha todos os campos!');
                return;
            }

            try {
                await addDoc(collection(db, 'pagamentos'), {
                    motoboy,
                    valor,
                    data: Timestamp.now(),
                    status: 'pago',
                    tipo: 'manual'
                });

                alert('Pagamento registrado com sucesso!');
                document.getElementById('motoboyPagamento').value = '';
                document.getElementById('valorPagamento').value = '';
                carregarPagamentos();
            } catch(e) {
                alert('Erro: ' + e.message);
            }
        };

        function carregarPagamentos() {
            onSnapshot(collection(db, 'pagamentos'), (snap) => {
                const tbody = document.getElementById('tabelaPagamentos');
                tbody.innerHTML = '';

                let totalHoje = 0;
                let totalMes = 0;
                let totalPendente = 0;

                const hoje = new Date();
                const mesAtual = hoje.getMonth();

                snap.forEach(d => {
                    const data = d.data();
                    const dataPagamento = new Date(data.data?.toDate?.() || Date.now());
                    const dataStr = dataPagamento.toLocaleDateString('pt-BR');

                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-slate-700 hover:bg-slate-700/50';
                    tr.innerHTML = `
                        <td class="p-3">${data.motoboy}</td>
                        <td class="p-3">${dataStr}</td>
                        <td class="p-3">-</td>
                        <td class="p-3 font-bold text-green-400">R$ ${data.valor.toFixed(2)}</td>
                        <td class="p-3"><span class="px-2 py-1 rounded text-xs font-bold ${data.status === 'pago' ? 'bg-green-900 text-green-300' : 'bg-orange-900 text-orange-300'}">${data.status}</span></td>
                    `;
                    tbody.appendChild(tr);

                    if(dataPagamento.toDateString() === hoje.toDateString()) {
                        totalHoje += data.valor;
                    }
                    if(dataPagamento.getMonth() === mesAtual) {
                        totalMes += data.valor;
                    }
                    if(data.status === 'pendente') {
                        totalPendente += data.valor;
                    }
                });

                document.getElementById('totalPagoHoje').textContent = `R$ ${totalHoje.toFixed(2)}`;
                document.getElementById('totalPagoMes').textContent = `R$ ${totalMes.toFixed(2)}`;
                document.getElementById('totalPendente').textContent = `R$ ${totalPendente.toFixed(2)}`;
            });
        }

        carregarPagamentos();
    </script>
</body>
</html>
