<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Histórico - Marcelo Entregas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen pb-10">

    <div class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-black mb-6">📜 Histórico de Entregas</h1>

        <!-- Filtros -->
        <div class="bg-slate-800 rounded-3xl p-6 mb-6 border border-slate-700">
            <h2 class="text-lg font-black mb-4">🔍 Filtros</h2>
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400">Loja</label>
                    <input type="text" id="filtroLoja" placeholder="Digite o nome da loja" class="w-full p-3 bg-slate-700 rounded-xl text-white border border-slate-600 placeholder-slate-500">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-400">Data</label>
                    <input type="date" id="filtroData" class="w-full p-3 bg-slate-700 rounded-xl text-white border border-slate-600">
                </div>
                <button onclick="filtrarHistorico()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold transition-all">
                    🔄 Filtrar
                </button>
            </div>
        </div>

        <!-- Estatísticas -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-green-900/30 border border-green-700 rounded-2xl p-4">
                <p class="text-xs text-green-300 uppercase font-bold">Total Entregas</p>
                <p id="totalEntregasHist" class="text-3xl font-black text-green-400">0</p>
            </div>
            <div class="bg-blue-900/30 border border-blue-700 rounded-2xl p-4">
                <p class="text-xs text-blue-300 uppercase font-bold">Lojas Atendidas</p>
                <p id="totalLojas" class="text-3xl font-black text-blue-400">0</p>
            </div>
        </div>

        <!-- Lista de Entregas -->
        <div class="space-y-3">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-black">📦 Entregas Realizadas</h2>
                <span id="contagemEntregas" class="bg-blue-600 px-3 py-1 rounded-full text-sm font-bold">0</span>
            </div>
            <div id="listaHistorico" class="space-y-3">
                <div class="text-center text-slate-400 py-8">
                    <p>Carregando histórico...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjP9dxFEp09DpZl5JkVMD05uaKoQTNDpE", 
            authDomain: "meuappentregas.firebaseapp.com", 
            projectId: "meuappentregas", 
            appId: "1:442484186787:web:ac914827ebebda987f2916" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let todasAsEntregas = [];

        // Carregar histórico de entregas
        onSnapshot(query(collection(db, 'chamadas'), orderBy('hora', 'desc')), (snap) => {
            todasAsEntregas = [];
            snap.forEach(d => {
                const data = d.data();
                todasAsEntregas.push({
                    id: d.id,
                    loja: data.loja,
                    endereco: data.enderecoLoja,
                    entregas: data.contagem || 0,
                    data: data.hora?.toDate?.() || new Date(),
                    visualizado: data.visualizado,
                    zap: data.zap
                });
            });
            atualizarLista();
            atualizarEstatisticas();
        });

        function atualizarLista() {
            const container = document.getElementById('listaHistorico');
            const filtroLoja = document.getElementById('filtroLoja').value.toLowerCase();
            const filtroData = document.getElementById('filtroData').value;

            let filtradas = todasAsEntregas.filter(item => {
                const lojaMatch = item.loja.toLowerCase().includes(filtroLoja);
                const dataMatch = !filtroData || item.data.toISOString().split('T')[0] === filtroData;
                return lojaMatch && dataMatch;
            });

            if(filtradas.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-8"><p>Nenhuma entrega encontrada</p></div>';
                document.getElementById('contagemEntregas').textContent = '0';
                return;
            }

            container.innerHTML = '';
            filtradas.forEach(item => {
                const div = document.createElement('div');
                const data = item.data.toLocaleDateString('pt-BR');
                const hora = item.data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                div.className = `bg-slate-800 rounded-2xl p-4 border-l-4 ${item.visualizado ? 'border-green-600' : 'border-orange-600'} hover:bg-slate-700 transition-all cursor-pointer`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <h3 class="font-black text-lg">${item.loja}</h3>
                            <p class="text-xs text-slate-400">${item.endereco}</p>
                        </div>
                        <span class="text-2xl font-black text-green-400">${item.entregas}</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-slate-400">
                        <span>${data} às ${hora}</span>
                        <span class="px-2 py-1 rounded ${item.visualizado ? 'bg-green-900 text-green-300' : 'bg-orange-900 text-orange-300'} font-bold">
                            ${item.visualizado ? '✅ Concluído' : '⏳ Pendente'}
                        </span>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('contagemEntregas').textContent = filtradas.length;
        }

        function atualizarEstatisticas() {
            const totalEntregas = todasAsEntregas.reduce((sum, item) => sum + item.entregas, 0);
            const lojas = new Set(todasAsEntregas.map(item => item.loja)).size;

            document.getElementById('totalEntregasHist').textContent = totalEntregas;
            document.getElementById('totalLojas').textContent = lojas;
        }

        window.filtrarHistorico = () => {
            atualizarLista();
        };

        // Limpar filtros ao carregar
        document.getElementById('filtroLoja').value = '';
        document.getElementById('filtroData').value = '';
    </script>
</body>
</html>
